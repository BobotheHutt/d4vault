<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D4 Vault — Paladin Skill Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --bg2:#111118; --bg3:#18181f;
  --border:rgba(180,140,80,.18); --border2:rgba(180,140,80,.4);
  --gold:#c9a84c; --gold2:#e8c97a;
  --text:#d4cfc0; --text2:#8a8070; --text3:#5a5040;
  --green:#2ecc71; --red:#e74c3c; --blue:#5dade2;
  --font-head:'Cinzel',serif; --font-body:'Rajdhani',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);display:flex;flex-direction:column;}

#toolbar{
  height:52px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:10;
}
.t-title{font-family:var(--font-head);font-size:14px;color:var(--gold2);letter-spacing:.1em;margin-right:6px;}
.t-sep{width:1px;height:24px;background:var(--border);}
.mbtn{
  font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:6px 14px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;
}
.mbtn:hover{border-color:var(--border2);color:var(--text2);}
.mbtn.mg{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold2);}
.mbtn.mp{background:rgba(46,204,113,.12);border-color:rgba(46,204,113,.5);color:var(--green);}
.pts{display:flex;gap:14px;font-size:12px;}
.pi{display:flex;align-items:center;gap:5px;}
.pd{width:8px;height:8px;border-radius:50%;}
.pl{color:var(--text3);}
.pv{color:var(--text);font-weight:600;}
.zbtn{
  width:28px;height:28px;font-size:16px;line-height:1;border:1px solid var(--border);
  border-radius:3px;background:transparent;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.zbtn:hover{border-color:var(--border2);color:var(--text);}
.zlbl{font-size:12px;color:var(--text3);}
.ml-auto{margin-left:auto;}

#wrap{flex:1;overflow:hidden;position:relative;cursor:grab;}
#wrap.grabbing{cursor:grabbing;}
#c{position:absolute;top:0;left:0;transform-origin:0 0;}

#tip{
  position:fixed;background:var(--bg2);border:1px solid var(--border2);
  border-radius:4px;padding:10px 14px;max-width:260px;pointer-events:none;
  z-index:1000;display:none;font-size:13px;
}
.tn{font-family:var(--font-head);font-size:13px;color:var(--gold2);margin-bottom:4px;letter-spacing:.05em;}
.ttags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.ttag{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:1px 6px;border-radius:2px;background:rgba(201,168,76,.12);
  border:1px solid rgba(201,168,76,.3);color:var(--gold);}
.tr{font-size:11px;color:var(--gold);margin-bottom:4px;font-weight:600;}
.td{font-size:12px;color:var(--text2);line-height:1.5;}
.tc{font-size:11px;color:var(--blue);margin-top:4px;}
.th{font-size:10px;color:var(--text3);margin-top:5px;font-style:italic;}
</style>
</head>
<body>
<div id="toolbar">
  <span class="t-title">Paladin — Skill Tree</span>
  <div class="t-sep"></div>
  <button class="mbtn mg" id="btnG" onclick="setMode('guide')">Guide Mode</button>
  <button class="mbtn"    id="btnP" onclick="setMode('progress')">Progress Mode</button>
  <div class="t-sep"></div>
  <div class="pts">
    <div class="pi"><div class="pd" style="background:var(--gold)"></div><span class="pl">Guide</span><span class="pv" id="gPts">0</span></div>
    <div class="pi"><div class="pd" style="background:var(--green)"></div><span class="pl">Progress</span><span class="pv" id="pPts">0</span></div>
  </div>
  <div class="t-sep"></div>
  <div style="display:flex;gap:4px">
    <button class="zbtn" onclick="doZoom(1.2)">+</button>
    <button class="zbtn" onclick="doZoom(0.8)">−</button>
    <button class="zbtn" onclick="resetView()" title="Reset">⌂</button>
  </div>
  <span class="zlbl ml-auto" id="zlbl">65%</span>
</div>

<div id="wrap">
  <canvas id="c"></canvas>
</div>

<div id="tip">
  <div class="tn" id="tN"></div>
  <div class="ttags" id="tT"></div>
  <div class="tr" id="tR"></div>
  <div class="td" id="tD"></div>
  <div class="tc" id="tC"></div>
  <div class="th" id="tH"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────
const SZ = { active:42, ultimate:50, passive:26, upgrade:20, key:54 };
const SPINE_COLOR = 'rgba(180,50,50,0.55)';
const SPINE_W     = 6;

// ── STATE ────────────────────────────────────────────────────────────────
let data, flat = [];
let mode = 'guide';
let gRanks = {}, pRanks = {};
let scale = 0.65, panX = 100, panY = 40;
let panning = false, lastM = {x:0,y:0};
let hovered = null;
let clickNode = null, clickStart = null;

// ── LOAD ─────────────────────────────────────────────────────────────────
async function load() {
  const res = await fetch('data/skills/paladin.json');
  data = await res.json();
  buildFlat();
  const maxX = Math.max(...flat.map(n=>n.x)) + 160;
  const maxY = Math.max(...flat.map(n=>n.y)) + 160;
  const cv = document.getElementById('c');
  cv.width = maxX; cv.height = maxY;
  loadState();
  draw();
}

function buildFlat() {
  flat = [];
  for (const sec of data.sections) {
    for (const p of (sec.passives||[])) flat.push({...p, sec:sec.id, secCol:sec.color, parentId:null});
    for (const n of (sec.nodes||[])) flattenNode(n, sec, null);
  }
}

function flattenNode(n, sec, parentId) {
  flat.push({...n, sec:sec.id, secCol:sec.color, parentId, upgrades:undefined});
  for (const u of (n.upgrades||[])) flattenNode(u, sec, n.id);
}

// ── DRAW ─────────────────────────────────────────────────────────────────
function draw() {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  drawSpine(ctx);
  drawConnections(ctx);
  for (const n of flat) drawNode(ctx, n);
  updatePts();
}

function drawSpine(ctx) {
  if (!data.spine || data.spine.length < 2) return;
  ctx.strokeStyle = SPINE_COLOR;
  ctx.lineWidth   = SPINE_W;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(data.spine[0].x, data.spine[0].y);
  for (let i = 1; i < data.spine.length; i++) {
    ctx.lineTo(data.spine[i].x, data.spine[i].y);
  }
  ctx.stroke();

  // Hub diamonds
  for (const hub of data.spine) {
    const sec = data.sections.find(s => s.hubId === hub.id);
    const col = sec ? sec.color : '#888';
    ctx.save();
    ctx.translate(hub.x, hub.y);
    ctx.rotate(Math.PI/4);
    ctx.fillStyle   = '#111118';
    ctx.strokeStyle = col;
    ctx.lineWidth   = 2;
    ctx.fillRect(-14,-14,28,28);
    ctx.strokeRect(-14,-14,28,28);
    ctx.restore();
    // Inner dot
    ctx.beginPath();
    ctx.arc(hub.x, hub.y, 4, 0, Math.PI*2);
    ctx.fillStyle = col;
    ctx.fill();
  }
}

function drawConnections(ctx) {
  for (const n of flat) {
    const par = flat.find(x => x.id === n.parentId);
    if (!par) {
      // Connect first-level nodes to their section hub
      const sec = data.sections.find(s => s.id === n.sec);
      if (sec) {
        const hub = data.spine.find(h => h.id === sec.hubId);
        if (hub) {
          const gr = gRanks[n.id]||0, pgr = gRanks[hub.id]||0;
          const pr = pRanks[n.id]||0;
          drawLine(ctx, hub.x, hub.y, n.x, n.y, false,
            mode==='guide'    ? (gr>0 ? true : false) : (pr>0 ? true : false),
            sec.color
          );
        }
      }
      continue;
    }
    const gr = gRanks[n.id]||0, pr = pRanks[n.id]||0;
    const pgr = gRanks[par.id]||0, ppr = pRanks[par.id]||0;
    const lit = mode==='guide' ? (gr>0&&pgr>0) : (pr>0&&ppr>0);
    drawLine(ctx, par.x, par.y, n.x, n.y, false, lit, n.secCol);
  }
}

function drawLine(ctx, x1, y1, x2, y2, dashed, lit, col) {
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  if (lit) {
    ctx.strokeStyle = mode==='guide' ? (col||'rgba(201,168,76,.8)') : 'rgba(46,204,113,.8)';
    ctx.lineWidth   = 2;
    ctx.setLineDash([]);
  } else {
    ctx.strokeStyle = 'rgba(90,80,60,.35)';
    ctx.lineWidth   = 1;
    ctx.setLineDash([3,3]);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawNode(ctx, n) {
  const {x,y,type,name,maxRank,secCol} = n;
  const gr = gRanks[n.id]||0;
  const pr = pRanks[n.id]||0;
  const rank = mode==='guide' ? gr : pr;
  const has  = rank > 0;
  const hov  = hovered && hovered.id===n.id;

  ctx.save();

  if (type==='active'||type==='ultimate') {
    drawSquare(ctx, n, gr, pr, has, hov, secCol);
  } else if (type==='key-passive') {
    drawKeyPassive(ctx, n, gr, pr, has, hov);
  } else if (type==='passive') {
    drawDiamond(ctx, n, gr, pr, has, hov, SZ.passive, secCol);
  } else {
    drawDiamond(ctx, n, gr, pr, has, hov, SZ.upgrade, secCol);
  }

  ctx.restore();
}

function drawSquare(ctx, n, gr, pr, has, hov, col) {
  const {x,y,type,name,maxRank} = n;
  const sz = type==='ultimate' ? SZ.ultimate : SZ.active;
  const h  = sz/2;

  if (has||hov) {
    ctx.shadowColor = has ? (mode==='guide' ? 'rgba(201,168,76,.55)' : 'rgba(46,204,113,.55)') : 'rgba(201,168,76,.25)';
    ctx.shadowBlur  = has ? 12 : 6;
  }

  ctx.fillStyle = has
    ? (mode==='guide' ? 'rgba(38,28,8,.95)' : 'rgba(8,30,15,.95)')
    : '#141008';
  rr(ctx, x-h, y-h, sz, sz, 4);
  ctx.fill();

  ctx.shadowBlur  = 0;
  ctx.strokeStyle = has
    ? (mode==='guide' ? col||'#c9a84c' : '#2ecc71')
    : (hov ? 'rgba(201,168,76,.5)' : 'rgba(80,65,35,.6)');
  ctx.lineWidth   = has ? 2 : 1;
  rr(ctx, x-h, y-h, sz, sz, 4);
  ctx.stroke();

  // Progress bar overlay
  if (mode==='progress' && gr>0) {
    const frac = Math.min((pRanks[n.id]||0)/n.maxRank, 1);
    ctx.fillStyle = 'rgba(46,204,113,.22)';
    ctx.fillRect(x-h+2, y+h-7, (sz-4)*frac, 4);
    ctx.strokeStyle = 'rgba(46,204,113,.3)';
    ctx.lineWidth   = .5;
    ctx.strokeRect(x-h+2, y+h-7, sz-4, 4);
  }

  const rank = mode==='guide' ? gr : (pRanks[n.id]||0);
  if (maxRank>1) {
    ctx.font         = 'bold 9px Rajdhani,sans-serif';
    ctx.fillStyle    = has ? (mode==='guide' ? '#e8c97a' : '#2ecc71') : '#3a3028';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`${rank}/${maxRank}`, x, y+h-1);
  }

  ctx.font         = '500 9px Rajdhani,sans-serif';
  ctx.fillStyle    = has ? '#c8c0b0' : '#3a3028';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(trunc(name,11), x, y + (maxRank>1 ? -5 : 0));
}

function drawDiamond(ctx, n, gr, pr, has, hov, sz, col) {
  const {x,y,name,maxRank,type} = n;
  const h = sz/2;
  const rank = mode==='guide' ? gr : pr;

  if (has||hov) {
    ctx.shadowColor = has ? (mode==='guide' ? 'rgba(201,168,76,.45)' : 'rgba(46,204,113,.45)') : 'rgba(201,168,76,.2)';
    ctx.shadowBlur  = has ? 8 : 4;
  }

  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(Math.PI/4);
  ctx.fillStyle = has
    ? (mode==='guide' ? 'rgba(38,28,8,.95)' : 'rgba(8,28,15,.95)')
    : (type==='passive' ? '#0d1218' : '#100c08');
  ctx.fillRect(-h,-h,sz,sz);
  ctx.shadowBlur  = 0;
  ctx.strokeStyle = has
    ? (mode==='guide' ? col||'#c9a84c' : '#2ecc71')
    : (hov ? 'rgba(201,168,76,.4)' : type==='passive' ? 'rgba(40,70,100,.5)' : 'rgba(70,55,30,.5)');
  ctx.lineWidth   = has ? 1.5 : 0.75;
  ctx.strokeRect(-h,-h,sz,sz);
  ctx.restore();

  if (maxRank>1 && sz>=24) {
    ctx.font         = 'bold 8px Rajdhani,sans-serif';
    ctx.fillStyle    = has ? (mode==='guide' ? '#e8c97a' : '#2ecc71') : '#2a2018';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${rank}/${maxRank}`, x, y);
  } else if (sz < 24) {
    ctx.beginPath();
    ctx.arc(x, y, has ? 3 : 2, 0, Math.PI*2);
    ctx.fillStyle = has ? (mode==='guide' ? '#c9a84c' : '#2ecc71') : '#2a2018';
    ctx.fill();
  }

  // Passive name label (only if big enough)
  if (type==='passive' && sz>=24) {
    ctx.font         = '500 8px Rajdhani,sans-serif';
    ctx.fillStyle    = has ? '#a09080' : '#2a2018';
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(trunc(name,14), x+sz/2+4, y);
  }
}

function drawKeyPassive(ctx, n, gr, pr, has, hov) {
  const {x,y,name,maxRank} = n;
  const r = SZ.key/2;
  const rank = mode==='guide' ? gr : pr;

  if (has||hov) {
    ctx.shadowColor = has ? (mode==='guide' ? 'rgba(255,100,100,.7)' : 'rgba(46,204,113,.7)') : 'rgba(255,100,100,.3)';
    ctx.shadowBlur  = has ? 18 : 8;
  }

  // Star shape
  star(ctx, x, y, r+5, r-2, 8);
  ctx.fillStyle   = has ? (mode==='guide' ? 'rgba(60,10,10,.95)' : 'rgba(10,40,20,.95)') : '#130808';
  ctx.fill();
  ctx.shadowBlur  = 0;
  ctx.strokeStyle = has ? (mode==='guide' ? '#ff6b6b' : '#2ecc71') : (hov ? 'rgba(255,100,100,.5)' : '#4a1010');
  ctx.lineWidth   = has ? 2 : 1;
  ctx.stroke();

  // Inner circle
  ctx.beginPath();
  ctx.arc(x,y,r-6,0,Math.PI*2);
  ctx.fillStyle   = has ? (mode==='guide' ? '#3a0e0e' : '#0a2818') : '#1a0808';
  ctx.fill();
  ctx.strokeStyle = has ? (mode==='guide' ? '#ff6b6b' : '#2ecc71') : '#3a0808';
  ctx.lineWidth   = 1;
  ctx.stroke();

  ctx.font         = '600 9px Rajdhani,sans-serif';
  ctx.fillStyle    = has ? (mode==='guide' ? '#ffaaaa' : '#88ffbb') : '#4a1818';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(trunc(name,10), x, y);
}

// ── HIT TEST ─────────────────────────────────────────────────────────────
function nodeAt(cx,cy) {
  for (const n of [...flat].reverse()) {
    const dx=cx-n.x, dy=cy-n.y;
    const r = hitR(n.type);
    if (Math.abs(dx)<=r && Math.abs(dy)<=r) return n;
  }
  return null;
}
function hitR(t) {
  if (t==='key-passive') return SZ.key/2+6;
  if (t==='active'||t==='ultimate') return (t==='ultimate'?SZ.ultimate:SZ.active)/2+3;
  if (t==='passive') return SZ.passive/2+3;
  return SZ.upgrade/2+3;
}
function s2c(sx,sy) {
  const r=document.getElementById('wrap').getBoundingClientRect();
  return { x:(sx-r.left-panX)/scale, y:(sy-r.top-panY)/scale };
}

// ── RANK OPS ─────────────────────────────────────────────────────────────
function inc(n) {
  const d = mode==='guide' ? gRanks : pRanks;
  d[n.id] = Math.min((d[n.id]||0)+1, n.maxRank||1);
  saveState(); draw();
}
function dec(n) {
  const d = mode==='guide' ? gRanks : pRanks;
  d[n.id] = Math.max((d[n.id]||0)-1, 0);
  if (!d[n.id]) delete d[n.id];
  saveState(); draw();
}
function updatePts() {
  document.getElementById('gPts').textContent = Object.values(gRanks).reduce((s,v)=>s+v,0);
  document.getElementById('pPts').textContent = Object.values(pRanks).reduce((s,v)=>s+v,0);
}

// ── MODE ──────────────────────────────────────────────────────────────────
function setMode(m) {
  mode=m;
  document.getElementById('btnG').className='mbtn'+(m==='guide'?' mg':'');
  document.getElementById('btnP').className='mbtn'+(m==='progress'?' mp':'');
  draw();
}

// ── ZOOM/PAN ─────────────────────────────────────────────────────────────
function doZoom(f, cx, cy) {
  const w=document.getElementById('wrap');
  cx=cx??w.clientWidth/2; cy=cy??w.clientHeight/2;
  const ns=Math.min(Math.max(scale*f,.15),3);
  panX=cx-(cx-panX)*(ns/scale);
  panY=cy-(cy-panY)*(ns/scale);
  scale=ns;
  applyXform();
}
function resetView() { scale=.65; panX=100; panY=40; applyXform(); }
function applyXform() {
  document.getElementById('c').style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zlbl').textContent=Math.round(scale*100)+'%';
}

const wrap = document.getElementById('wrap');
wrap.addEventListener('wheel', e=>{
  e.preventDefault();
  const r=wrap.getBoundingClientRect();
  doZoom(e.deltaY<0?1.1:.9, e.clientX-r.left, e.clientY-r.top);
},{passive:false});

wrap.addEventListener('mousedown', e=>{
  panning=true;
  lastM={x:e.clientX,y:e.clientY};
  wrap.classList.add('grabbing');
  if (e.button===0) {
    const p=s2c(e.clientX,e.clientY);
    const n=nodeAt(p.x,p.y);
    if (n) { clickNode=n; clickStart={x:e.clientX,y:e.clientY}; }
  }
});

wrap.addEventListener('mousemove', e=>{
  if (panning) {
    panX+=e.clientX-lastM.x; panY+=e.clientY-lastM.y;
    lastM={x:e.clientX,y:e.clientY};
    applyXform();
    if (clickStart && (Math.abs(e.clientX-clickStart.x)+Math.abs(e.clientY-clickStart.y))>4) clickNode=null;
  }
  const p=s2c(e.clientX,e.clientY);
  const n=nodeAt(p.x,p.y);
  if (n!==hovered){ hovered=n; draw(); }
  if (n) showTip(n,e.clientX,e.clientY); else hideTip();
});

wrap.addEventListener('mouseup', e=>{
  panning=false; wrap.classList.remove('grabbing');
  if (clickNode && e.button===0) { inc(clickNode); clickNode=null; clickStart=null; }
});

wrap.addEventListener('contextmenu', e=>{
  e.preventDefault();
  const p=s2c(e.clientX,e.clientY);
  const n=nodeAt(p.x,p.y);
  if (n) dec(n);
});

wrap.addEventListener('mouseleave', ()=>{ panning=false; wrap.classList.remove('grabbing'); hideTip(); hovered=null; draw(); });

// ── TOOLTIP ───────────────────────────────────────────────────────────────
function showTip(n,mx,my) {
  const gr=gRanks[n.id]||0, pr=pRanks[n.id]||0;
  document.getElementById('tN').textContent=n.name;
  const te=document.getElementById('tT'); te.innerHTML='';
  for (const t of (n.tags||[])) { const s=document.createElement('span'); s.className='ttag'; s.textContent=t; te.appendChild(s); }
  document.getElementById('tR').textContent=`Guide: ${gr}/${n.maxRank}  ·  Progress: ${pr}/${n.maxRank}`;
  document.getElementById('tD').textContent=n.desc||'';
  const cd=n.cooldown?`Cooldown: ${n.cooldown}s`:n.charges?`${n.charges} Charges (${n.chargeCooldown}s)`:'';
  document.getElementById('tC').textContent=cd;
  document.getElementById('tH').textContent=mode==='guide'?'Left click to add rank · Right click to remove':'Left click to mark progress · Right click to remove';
  const tip=document.getElementById('tip');
  let tx=mx+14, ty=my-20;
  if (tx+268>window.innerWidth)  tx=mx-278;
  if (ty+170>window.innerHeight) ty=my-170;
  tip.style.left=tx+'px'; tip.style.top=ty+'px'; tip.style.display='block';
}
function hideTip(){ document.getElementById('tip').style.display='none'; }

// ── PERSIST ───────────────────────────────────────────────────────────────
function saveState() {
  localStorage.setItem('d4v_pal_g', JSON.stringify(gRanks));
  localStorage.setItem('d4v_pal_p', JSON.stringify(pRanks));
}
function loadState() {
  try { gRanks=JSON.parse(localStorage.getItem('d4v_pal_g')||'{}'); } catch(e){ gRanks={}; }
  try { pRanks=JSON.parse(localStorage.getItem('d4v_pal_p')||'{}'); } catch(e){ pRanks={}; }
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function star(ctx,cx,cy,or,ir,pts){
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const r=i%2===0?or:ir, a=(i*Math.PI)/pts-Math.PI/2;
    if(i===0) ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    else ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
  }
  ctx.closePath();
}
function trunc(s,l){ return s.length>l?s.slice(0,l-1)+'…':s; }
