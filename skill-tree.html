<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D4 Vault — Paladin Skill Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12122a;--bg2:#1a1a38;--bdr:rgba(120,110,200,.25);--bdr2:rgba(160,150,220,.55);
  --gold:#c9a84c;--gold2:#e8c97a;
  --text:#d4cfc0;--text2:#9a9080;--text3:#6a6050;
  --green:#3edc81;--blue:#6dbfe8;
  --bdr:rgba(180,140,80,.22);--bdr2:rgba(180,140,80,.55);
  --font-h:'Cinzel',serif;--font-b:'Rajdhani',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:#12122a;color:var(--text);font-family:var(--font-b);display:flex;flex-direction:column;}
#bar{height:54px;background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
.ttl{font-family:var(--font-h);font-size:15px;color:var(--gold2);letter-spacing:.1em;}
.sep{width:1px;height:26px;background:var(--bdr);}
.mb{font-family:var(--font-b);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:7px 16px;border-radius:3px;border:1px solid var(--bdr);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.mb:hover{border-color:var(--bdr2);color:var(--text2);}
.mg{background:rgba(201,168,76,.2);border-color:var(--gold2);color:var(--gold2);}
.mp{background:rgba(62,220,129,.15);border-color:rgba(62,220,129,.6);color:var(--green);}
.pts{display:flex;gap:16px;font-size:13px;}
.pi{display:flex;align-items:center;gap:6px;}
.pd{width:9px;height:9px;border-radius:50%;}
.pl{color:var(--text3);}.pv{color:var(--text);font-weight:600;}
.zb{width:30px;height:30px;font-size:18px;border:1px solid var(--bdr);border-radius:3px;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.zb:hover{border-color:var(--bdr2);color:var(--text);}
.zl{font-size:13px;color:var(--text3);min-width:44px;}
.ml{margin-left:auto;}
#wrap{flex:1;overflow:hidden;position:relative;cursor:grab;}
#wrap.g{cursor:grabbing;}
#cv{position:absolute;top:0;left:0;transform-origin:0 0;}
#tip{position:fixed;background:#1a1a38;border:1px solid rgba(150,140,220,.5);border-radius:5px;padding:12px 16px;max-width:290px;pointer-events:none;z-index:1000;display:none;}
.tn{font-family:var(--font-h);font-size:14px;color:var(--gold2);margin-bottom:5px;}
.tgs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.tg{font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:2px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);color:var(--gold);}
.tr{font-size:12px;color:var(--gold);margin-bottom:4px;font-weight:600;}
.td{font-size:12px;color:var(--text2);line-height:1.6;}
.tc{font-size:12px;color:var(--blue);margin-top:4px;}
.th{font-size:11px;color:var(--text3);margin-top:5px;font-style:italic;}
</style>
</head>
<body>
<div id="bar">
  <span class="ttl">Paladin — Skill Tree</span>
  <div class="sep"></div>
  <button class="mb mg" id="bG" onclick="SM('guide')">Guide Mode</button>
  <button class="mb"    id="bP" onclick="SM('progress')">Progress Mode</button>
  <div class="sep"></div>
  <div class="pts">
    <div class="pi"><div class="pd" style="background:var(--gold)"></div><span class="pl">Guide</span><span class="pv" id="gP">0</span></div>
    <div class="pi"><div class="pd" style="background:var(--green)"></div><span class="pl">Progress</span><span class="pv" id="pP">0</span></div>
  </div>
  <div class="sep"></div>
  <div style="display:flex;gap:5px">
    <button class="zb" onclick="DZ(1.2)">+</button>
    <button class="zb" onclick="DZ(0.8)">−</button>
    <button class="zb" onclick="RV()">⌂</button>
  </div>
  <span class="zl ml" id="zl">55%</span>
</div>
<div id="wrap">
  <canvas id="cv"></canvas>
</div>
<div id="tip">
  <div class="tn" id="tN"></div>
  <div class="tgs" id="tT"></div>
  <div class="tr" id="tR"></div>
  <div class="td" id="tD"></div>
  <div class="tc" id="tC"></div>
  <div class="th" id="tH"></div>
</div>
<script>

// HARDCODED LAYOUT
// Each section has a center hub. Skills radiate out at clock positions.
// Clockwise sections (right-side hubs): angles increase going CW
// Counter-clockwise sections (left-side hubs): angles increase going CCW
//
// Clock angle convention: 0° = top (12 o'clock), 90° = right, 180° = bottom, 270° = left
// For each active skill: place at ARM_R from hub
// For its upgrades: place at UPARM_R further out in same direction
//   Enhanced = same angle, Choices A/B = spread ±25° from enhanced
//   Third upgrade = opposite perpendicular
//
// Passives sit at PASS_R on their own arms between actives
// ══════════════════════════════════════════════════════════════════════════

const ARM_R   = 270;  // active skill distance from hub
const UPARM_R = 105;  // upgrade distance from active
const PASS_R  = 190;  // passive distance from hub
const SZ = {active:52, ultimate:58, passive:32, upgrade:24, key:60};
const D2R = Math.PI/180;

// Hub positions on the zigzag spine
// Spine alternates: odd sections left (~x=380), even sections right (~x=820)
const HUBS = {
  basic:    {x:700,  y:120,  cw:true},
  core:     {x:340,  y:540,  cw:false},
  aura:     {x:860,  y:980,  cw:true},
  valor:    {x:340,  y:1460, cw:false},
  justice:  {x:860,  y:1940, cw:true},
  ultimate: {x:340,  y:2400, cw:false},
  keys:     {x:860,  y:2860, cw:true}
};

// Section colors
const SC = {
  basic:'#c8a96e', core:'#e8c97a', aura:'#ffb347',
  valor:'#7dd87d', justice:'#da70d6', ultimate:'#ff7070', keys:'#ff5555'

// angle = degrees from top (0=12 o'clock). CW: increasing angles. CCW: decreasing.
// Each active has: id, name, angle, maxRank, type, tags, desc, cooldown?
//   upgrades: [{id,name,desc,maxRank}, ...]  (always: Enhanced first, then variants)

  // ── BASIC (CW, top hub) ────────────────────────────────────────────────

  // Clash(right ~135°), Advance(lower-right ~225°) — but basic is at top so spread above
  // Actually: CW starting from upper-left going right: 315, 360/0, 45, 90
  {

      {id:'holybolt',  name:'Holy Bolt', angle:45,  maxRank:5, type:'active', tags:['Judicator'],

      {id:'bhammer',      name:'Blessed Hammer', angle:295, maxRank:5, type:'active', tags:['Judicator'],
       desc:'Throw a Blessed Hammer that spirals out dealing 161% damage.',
       upgrades:[
         {id:'bhammer-enh',name:'Enhanced Blessed Hammer',desc:'Blessed Hammer now hits enemies multiple times.',maxRank:1,
          choices:[
            {id:'bhammer-sht',name:'Shattering Blow',desc:'Blessed Hammer deals 115% and shatters into 3 small explosions on impact.',maxRank:1},
            {id:'bhammer-dis',name:"Disciple's Halo",desc:'Becomes a Disciple Skill orbiting around you.',maxRank:1}
          ]},
         {id:'bhammer-mor',name:'Mortar Combat',desc:'Blessed Hammer mortars 3 hammers to the ground, dealing 67% damage in an area.',maxRank:1}
       ]},
      {id:'dlance',       name:'Divine Lance',   angle:215, maxRank:5, type:'active', tags:['Disciple','Mobility'],
       desc:'Impale enemies with a heavenly lance, stabbing 2 times for 126% damage each.',
       upgrades:[
         {id:'dlance-enh',name:'Enhanced Divine Lance',desc:"Divine Lance's damage increased by 30% of your Movement Speed bonus.",maxRank:1,
          choices:[
            {id:'dlance-tip',name:'Tip of the Spear',desc:'Divine Lance flurries, stabbing 2 additional times.',maxRank:1},
            {id:'dlance-jou',name:'Zealous Joust',desc:'Becomes a Zealot Skill, stabbing with 2 additional spears.',maxRank:1}
          ]},
         {id:'dlance-jav',name:'Divine Javelin',desc:'Throw Divine Lance, dealing 90% damage to first enemy and bursting for 450%.',maxRank:1}
       ]},
      {id:'sbash',        name:'Shield Bash',    angle:140, maxRank:5, type:'active', tags:['Mobility','Juggernaut'],

       upgrades:[
         {id:'sbash-enh',name:'Enhanced Shield Bash',desc:'Hits with Shield Bash count as Blocks.',maxRank:1,
          choices:[
            {id:'sbash-bre',name:'Breach',desc:'Shield Bash grants 10% Retribution Chance for 5 seconds, stacking up to 5 times.',maxRank:1},

         {id:'sbash-lay',name:'Lay Siege',desc:'Whenever you have Resolve, Shield Bash increases impact size by x50% and deals 246% damage.',maxRank:1}

    // Passives: between actives at midpoint angles
    passives:[
      {id:'discipline', name:'Discipline',  angle:55,  maxRank:3, desc:'Your Core Skills deal x18% increased damage.'},
      {id:'en-guarde',  name:'En Guarde',   angle:335, maxRank:3, desc:'You gain +30% Armor and +15% Block Chance.'},
      {id:'riposte',    name:'Riposte',     angle:255, maxRank:3, desc:'Blocking grants you 18% damage for 5 seconds.'},

  // ── AURA (CW, right hub) ──────────────────────────────────────────────
  // 3 actives CW: Fanaticism Aura, Defiance Aura, Holy Light Aura
  // Right hub, CW: spread evenly left side: 240, 180, 120
  {
    section:'aura', hubKey:'aura', color:SC.aura,
    actives:[
      {id:'fan-aura', name:'Fanaticism Aura', angle:300, maxRank:5, type:'active', tags:['Zealot'], cooldown:15,
       desc:'Passive: Spending Faith grants +7% Attack Speed and +2.8% Crit Chance. Active: Weaken all Nearby enemies for 4 seconds.',
       upgrades:[
         {id:'fan-enh',name:'Enhanced Fanaticism Aura',desc:"Fanaticism Aura's passive also grants 10% Maximum Resource.",maxRank:1,
          choices:[
            {id:'fan-ven',name:'Rite of Vengeance',desc:"Passive increases Critical Strike Damage by x15%. Critical Strikes trigger Fanaticism's Passive.",maxRank:1},

       ]},
      {id:'def-aura', name:'Defiance Aura',   angle:180, maxRank:5, type:'active', tags:['Defensive','Juggernaut'], cooldown:20,

      {id:'hla',      name:'Holy Light Aura', angle:60,  maxRank:5, type:'active', tags:['Judicator'], cooldown:25,
       desc:"Passive: You and allies deal 126% damage every 2 seconds to 3 random Nearby enemies. Active: Unleash 2 bolts of light dealing 448% Holy damage.",
       upgrades:[
         {id:'hla-enh',name:'Enhanced Holy Light Aura',desc:"Holy Light's passive now targets 2 additional enemies.",maxRank:1,

      {id:'fstar',  name:'Falling Star',  angle:250, maxRank:5, type:'active', tags:['Disciple','Mobility'], cooldown:12,

      {id:'rally',  name:'Rally',         angle:160, maxRank:5, type:'active', tags:['Zealot'], charges:3, chargeCooldown:16,
       desc:'Rally forth, gaining 20% Movement Speed for 8 seconds and generating 30 Faith.',
       upgrades:[

// ── COMPUTE ALL NODE POSITIONS ────────────────────────────────────────────
function ang(deg) { return (deg - 90) * D2R; } // convert to standard math angle (0=right)

function polar(cx, cy, r, deg) {
  const a = ang(deg);
  return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
}

const ALL = []; // flat node list: {id, name, type, maxRank, tags, desc, cooldown, charges, chargeCooldown, x, y, sec, col, parentId}

// Spine connections array for drawing
const SPINE_SEGS = [];

function buildAll() {
  const hubOrder = ['basic','core','aura','valor','justice','ultimate','keys'];

  for (let si = 0; si < SECTIONS.length; si++) {
    const sec  = SECTIONS[si];
    const hub  = HUBS[sec.hubKey];
    const col  = sec.color;
    const skey = sec.section;

    // Passives
    for (const p of sec.passives) {
      const pos = polar(hub.x, hub.y, PASS_R, p.angle);
      ALL.push({id:p.id, name:p.name, type:'passive', maxRank:p.maxRank,
        tags:[], desc:p.desc, x:pos.x, y:pos.y, sec:skey, col, parentId:null});
    }

    // Actives + upgrades
    for (const act of sec.actives) {
      const thisARM = act.type==='key-passive' ? ARM_R * 1.6 : ARM_R;
      const apos = polar(hub.x, hub.y, thisARM, act.angle);
      ALL.push({id:act.id, name:act.name, type:act.type, maxRank:act.maxRank,
        tags:act.tags||[], desc:act.desc, cooldown:act.cooldown,
        charges:act.charges, chargeCooldown:act.chargeCooldown,
        x:apos.x, y:apos.y, sec:skey, col, parentId:null});

      // Upgrades
      for (const upg of (act.upgrades||[])) {
        const upos = polar(apos.x, apos.y, UPARM_R, act.angle);
        ALL.push({id:upg.id, name:upg.name, type:'upgrade', maxRank:upg.maxRank,
          tags:[], desc:upg.desc, x:upos.x, y:upos.y, sec:skey, col, parentId:act.id});

        // Choice upgrades
        const choices = upg.choices || [];
        if (choices.length >= 2) {
          const perp1 = act.angle + 30;
          const perp2 = act.angle - 30;
          const c1pos = polar(upos.x, upos.y, UPARM_R, perp1);
          const c2pos = polar(upos.x, upos.y, UPARM_R, perp2);
          ALL.push({id:choices[0].id, name:choices[0].name, type:'upgrade', maxRank:choices[0].maxRank,
            tags:[], desc:choices[0].desc, x:c1pos.x, y:c1pos.y, sec:skey, col, parentId:upg.id});
          ALL.push({id:choices[1].id, name:choices[1].name, type:'upgrade', maxRank:choices[1].maxRank,
            tags:[], desc:choices[1].desc, x:c2pos.x, y:c2pos.y, sec:skey, col, parentId:upg.id});
        }

        // 3rd upgrade option (not choices, branches differently)
        if (act.upgrades.length > 1 && upg === act.upgrades[1]) {
          // Already placed above as direct upgrade
        }
      }

      // Place second top-level upgrade at a different angle
      if ((act.upgrades||[]).length >= 2) {
        const upg2 = act.upgrades[1];
        const u2pos = polar(apos.x, apos.y, UPARM_R, act.angle + 60);
        // Update the position of the last pushed upgrade
        const existing = ALL.find(n => n.id === upg2.id);
        if (existing) { existing.x = u2pos.x; existing.y = u2pos.y; existing.parentId = act.id; }
      }
    }

    // Spine segment to next hub
    if (si < SECTIONS.length - 1) {
      const nextHub = HUBS[SECTIONS[si+1].hubKey];
      SPINE_SEGS.push({x1:hub.x, y1:hub.y, x2:nextHub.x, y2:nextHub.y});
    }
  }
}

buildAll();

// ── CANVAS SETUP ──────────────────────────────────────────────────────────
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');

const maxX = Math.max(...Object.values(HUBS).map(h=>h.x)) + 400;
const maxY = Math.max(...Object.values(HUBS).map(h=>h.y)) + 300;
cv.width = maxX; cv.height = maxY;

// ── RENDER STATE ──────────────────────────────────────────────────────────
let mode='guide', gR={}, pR={};
let sc=0.55, px=80, py=40;
let panning=false, lm={x:0,y:0};
let hov=null, cn=null, cs=null;

function draw() {
  ctx.clearRect(0,0,cv.width,cv.height);
  drawSpine();
  drawConnections();
  for (const n of ALL) drawN(n);
  updPts();
}

// ── SPINE ────────────────────────────────────────────────────────────────
function drawSpine() {
  const hkeys = ['basic','core','aura','valor','justice','ultimate','keys'];
  // Subtle dashed spine only
  ctx.strokeStyle='rgba(100,100,180,.2)';
  ctx.lineWidth=1.5; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.setLineDash([5,7]);
  ctx.beginPath();
  ctx.moveTo(HUBS.basic.x, HUBS.basic.y);
  for (const k of hkeys.slice(1)) ctx.lineTo(HUBS[k].x, HUBS[k].y);
  ctx.stroke();
  ctx.setLineDash([]);
  // Hub diamonds - small subtle markers
  for (const [key, hub] of Object.entries(HUBS)) {
    const sz = 18;
    ctx.save();
    ctx.translate(hub.x, hub.y);
    ctx.rotate(Math.PI/4);
    ctx.fillStyle='rgba(30,30,60,.9)';
    ctx.fillRect(-sz/2,-sz/2,sz,sz);
    ctx.strokeStyle='rgba(140,130,200,.45)'; ctx.lineWidth=1;
    ctx.strokeRect(-sz/2,-sz/2,sz,sz);
    ctx.restore();
  }
}

// ── CONNECTIONS ────────────────────────────────────────────────────────
function drawConnections() {
  for (const n of ALL) {
    let px2, py2;
    if (n.parentId) {
      const par = ALL.find(x=>x.id===n.parentId);
      if (!par) continue;
      px2=par.x; py2=par.y;
    } else {
      // connect to hub
      const hub = HUBS[SECTIONS.find(s=>s.section===n.sec)?.hubKey];
      if (!hub) continue;
      px2=hub.x; py2=hub.y;
    }
    const lit = mode==='guide'
      ? ((gR[n.id]||0)>0 && (n.parentId?(gR[n.parentId]||0):1)>0)
      : ((pR[n.id]||0)>0 && (n.parentId?(pR[n.parentId]||0):1)>0);

    ctx.beginPath(); ctx.moveTo(px2,py2); ctx.lineTo(n.x,n.y);
    if (lit) {
      ctx.strokeStyle=mode==='guide'?(n.col||'rgba(201,168,76,.9)'):'rgba(62,220,129,.9)';
      ctx.lineWidth=2.5; ctx.setLineDash([]);
    } else {
      ctx.strokeStyle='rgba(70,70,130,.4)';
      ctx.lineWidth=1; ctx.setLineDash([4,4]);
    }
    ctx.stroke(); ctx.setLineDash([]);
  }
}

// ── NODE DRAW ────────────────────────────────────────────────────────────
function drawN(n) {
  const {x,y,type,name,maxRank,col}=n;
  const gr=gR[n.id]||0, pr=pR[n.id]||0;
  const rank=mode==='guide'?gr:pr;
  const has=rank>0;
  const ih=hov&&hov.id===n.id;
  ctx.save();
  if (type==='active'||type==='ultimate') drawSq(n,has,ih,gr,pr,col);
  else if (type==='key-passive')          drawKey(n,has,ih);
  else if (type==='passive')              drawDia(n,has,ih,SZ.passive,col);
  else                                    drawDia(n,has,ih,SZ.upgrade,col);
  ctx.restore();
}

function drawSq(n,has,ih,gr,pr,col) {
  const {x,y,type,name,maxRank}=n;
  const sz=type==='ultimate'?SZ.ultimate:SZ.active;
  const h=sz/2;
  const rank=mode==='guide'?gr:pr;

  if (has) { ctx.shadowColor=mode==='guide'?col||'#c9a84c':'#3edc81'; ctx.shadowBlur=16; }
  else if (ih) { ctx.shadowColor='rgba(201,168,76,.45)'; ctx.shadowBlur=8; }

  ctx.fillStyle=has?(mode==='guide'?'#2a2010':'#0c2a1a'):(ih?'#1e1e38':'#16162e');
  RR(x-h,y-h,sz,sz,5); ctx.fill();
  ctx.shadowBlur=0;

  ctx.strokeStyle=has?(mode==='guide'?col||'#c9a84c':'#3edc81'):(ih?'rgba(160,150,220,.8)':'rgba(90,90,160,.5)');
  ctx.lineWidth=has?2.5:(ih?1.5:1);
  RR(x-h,y-h,sz,sz,5); ctx.stroke();

  // Corner marks when inactive
  if (!has&&!ih) {
    ctx.strokeStyle='rgba(90,90,160,.4)'; ctx.lineWidth=1;
    const a=9;
    [[x-h+2,y-h+a,x-h+2,y-h+2,x-h+a,y-h+2],
     [x+h-2,y-h+a,x+h-2,y-h+2,x+h-a,y-h+2],
     [x-h+2,y+h-a,x-h+2,y+h-2,x-h+a,y+h-2],
     [x+h-2,y+h-a,x+h-2,y+h-2,x+h-a,y+h-2]].forEach(pts=>{
      ctx.beginPath(); ctx.moveTo(pts[0],pts[1]); ctx.lineTo(pts[2],pts[3]); ctx.lineTo(pts[4],pts[5]); ctx.stroke();
    });
  }

  // Progress bar
  if (mode==='progress'&&gr>0) {
    const f=Math.min((pR[n.id]||0)/maxRank,1);
    ctx.fillStyle='rgba(62,220,129,.22)';
    ctx.fillRect(x-h+3,y+h-8,(sz-6)*f,5);
    ctx.strokeStyle='rgba(62,220,129,.35)'; ctx.lineWidth=.5;
    ctx.strokeRect(x-h+3,y+h-8,sz-6,5);
  }

  if (maxRank>1) {
    ctx.font='bold 11px Rajdhani,sans-serif';
    ctx.fillStyle=has?(mode==='guide'?'#f0d88a':'#5eec99'):'#5a4a2a';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(`${rank}/${maxRank}`,x,y+h-1);
  }
  const ls=wrapTxt(name,sz-6,11);
  ctx.font='600 11px Rajdhani,sans-serif';
  ctx.fillStyle=has?'#e0d8c8':(ih?'#a0a0d0':'#6060a0');
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const lh2=13, sy=y-(ls.length-1)*lh2/2+(maxRank>1?-6:0);
  ls.forEach((l,i)=>ctx.fillText(l,x,sy+i*lh2));
}

function drawDia(n,has,ih,sz,col) {
  const {x,y,name,maxRank,type}=n;
  const h=sz/2;
  const rank=mode==='guide'?(gR[n.id]||0):(pR[n.id]||0);
  if (has) { ctx.shadowColor=mode==='guide'?col||'#c9a84c':'#3edc81'; ctx.shadowBlur=9; }
  ctx.save();
  ctx.translate(x,y); ctx.rotate(Math.PI/4);
  ctx.fillStyle=has?(mode==='guide'?'#281e08':'#0c2010'):(ih?'#1e1e38':'#14142a');
  ctx.fillRect(-h,-h,sz,sz);
  ctx.shadowBlur=0;
  ctx.strokeStyle=has?(mode==='guide'?col||'#c9a84c':'#3edc81')
    :(ih?'rgba(160,150,220,.7)':type==='passive'?'rgba(90,120,200,.5)':'rgba(90,90,160,.45)');
  ctx.lineWidth=has?2:(ih?1.5:1);
  ctx.strokeRect(-h,-h,sz,sz);
  ctx.restore();

  if (maxRank>1&&sz>=28) {
    ctx.font='bold 10px Rajdhani,sans-serif';
    ctx.fillStyle=has?(mode==='guide'?'#f0d88a':'#5eec99'):'#3a3020';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`${rank}/${maxRank}`,x,y);
  } else if (sz<28) {
    ctx.beginPath(); ctx.arc(x,y,has?3.5:2.5,0,Math.PI*2);
    ctx.fillStyle=has?(mode==='guide'?col||'#c9a84c':'#3edc81'):'#3a3020'; ctx.fill();
  }

  if (type==='passive'&&sz>=28) {
    ctx.font='500 10px Rajdhani,sans-serif';
    ctx.fillStyle=has?'#c8b890':(ih?'#806a40':'#4a4030');
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(trunc(name,16),x+h+6,y);
  }
}

function drawKey(n,has,ih) {
  const {x,y,name}=n;
  const r=SZ.key/2;
  const rank=mode==='guide'?(gR[n.id]||0):(pR[n.id]||0);
  if (has) { ctx.shadowColor=mode==='guide'?'#ff8080':'#3edc81'; ctx.shadowBlur=22; }
  else if (ih) { ctx.shadowColor='rgba(255,100,100,.4)'; ctx.shadowBlur=10; }
  STAR(x,y,r+7,r-3,8);
  ctx.fillStyle=has?(mode==='guide'?'#300c0c':'#0c2818'):'#1a0808'; ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle=has?(mode==='guide'?'#ff7070':'#3edc81'):(ih?'rgba(255,120,120,.6)':'#5a1010');
  ctx.lineWidth=has?2.5:1.5; STAR(x,y,r+7,r-3,8); ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,r-5,0,Math.PI*2);
  ctx.fillStyle=has?(mode==='guide'?'#4a1010':'#103020'):'#220c0c'; ctx.fill();
  ctx.strokeStyle=has?(mode==='guide'?'#ff9090':'#5eec99'):'#4a1414'; ctx.lineWidth=1; ctx.stroke();
  ctx.font='600 10px Rajdhani,sans-serif';
  ctx.fillStyle=has?(mode==='guide'?'#ffb0b0':'#90ffcc'):'#6a2020';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(trunc(name,11),x,y);
}

// ── HIT TEST ────────────────────────────────────────────────────────────
function nodeAt(cx,cy) {
  for (const n of [...ALL].reverse()) {
    const r=n.type==='key-passive'?SZ.key/2+8:n.type==='active'?SZ.active/2+4:n.type==='ultimate'?SZ.ultimate/2+4:n.type==='passive'?SZ.passive/2+4:SZ.upgrade/2+4;
    if (Math.abs(cx-n.x)<=r&&Math.abs(cy-n.y)<=r) return n;
  }
  return null;
}
function s2c(sx,sy) {
  const r=document.getElementById('wrap').getBoundingClientRect();
  return {x:(sx-r.left-px)/sc,y:(sy-r.top-py)/sc};
}

// ── INTERACTIONS ────────────────────────────────────────────────────────
function inc(n){const d=mode==='guide'?gR:pR;d[n.id]=Math.min((d[n.id]||0)+1,n.maxRank||1);SV();draw();}
function dec(n){const d=mode==='guide'?gR:pR;d[n.id]=Math.max((d[n.id]||0)-1,0);if(!d[n.id])delete d[n.id];SV();draw();}
function updPts(){document.getElementById('gP').textContent=Object.values(gR).reduce((s,v)=>s+v,0);document.getElementById('pP').textContent=Object.values(pR).reduce((s,v)=>s+v,0);}
function SM(m){mode=m;document.getElementById('bG').className='mb'+(m==='guide'?' mg':'');document.getElementById('bP').className='mb'+(m==='progress'?' mp':'');draw();}
function DZ(f,cx,cy){const w=document.getElementById('wrap');cx=cx??w.clientWidth/2;cy=cy??w.clientHeight/2;const ns=Math.min(Math.max(sc*f,.1),3);px=cx-(cx-px)*(ns/sc);py=cy-(cy-py)*(ns/sc);sc=ns;AX();}
function RV(){sc=.55;px=80;py=40;AX();}
function AX(){cv.style.transform=`translate(${px}px,${py}px) scale(${sc})`;document.getElementById('zl').textContent=Math.round(sc*100)+'%';}

const wrap=document.getElementById('wrap');
wrap.addEventListener('wheel',e=>{e.preventDefault();const r=wrap.getBoundingClientRect();DZ(e.deltaY<0?1.1:.9,e.clientX-r.left,e.clientY-r.top);},{passive:false});
wrap.addEventListener('mousedown',e=>{panning=true;lm={x:e.clientX,y:e.clientY};wrap.classList.add('g');if(e.button===0){const p=s2c(e.clientX,e.clientY);const n=nodeAt(p.x,p.y);if(n){cn=n;cs={x:e.clientX,y:e.clientY};}}});
wrap.addEventListener('mousemove',e=>{if(panning){px+=e.clientX-lm.x;py+=e.clientY-lm.y;lm={x:e.clientX,y:e.clientY};AX();if(cs&&(Math.abs(e.clientX-cs.x)+Math.abs(e.clientY-cs.y))>5)cn=null;}const p=s2c(e.clientX,e.clientY);const n=nodeAt(p.x,p.y);if(n!==hov){hov=n;draw();}if(n)ST(n,e.clientX,e.clientY);else HT();});
wrap.addEventListener('mouseup',e=>{panning=false;wrap.classList.remove('g');if(cn&&e.button===0){inc(cn);cn=null;cs=null;}});
wrap.addEventListener('contextmenu',e=>{e.preventDefault();const p=s2c(e.clientX,e.clientY);const n=nodeAt(p.x,p.y);if(n)dec(n);});
wrap.addEventListener('mouseleave',()=>{panning=false;wrap.classList.remove('g');HT();hov=null;draw();});

// ── TOOLTIP ────────────────────────────────────────────────────────────
function ST(n,mx,my){
  const gr=gR[n.id]||0,pr=pR[n.id]||0;
  document.getElementById('tN').textContent=n.name;
  const te=document.getElementById('tT');te.innerHTML='';
  (n.tags||[]).forEach(t=>{const s=document.createElement('span');s.className='tg';s.textContent=t;te.appendChild(s);});
  document.getElementById('tR').textContent=`Guide: ${gr}/${n.maxRank}  ·  Progress: ${pr}/${n.maxRank}`;
  document.getElementById('tD').textContent=n.desc||'';
  document.getElementById('tC').textContent=n.cooldown?`Cooldown: ${n.cooldown}s`:n.charges?`${n.charges} Charges (${n.chargeCooldown}s)`:'';
  document.getElementById('tH').textContent=mode==='guide'?'Left click +rank · Right click −rank':'Left click mark progress · Right click remove';
  const tip=document.getElementById('tip');
  let tx=mx+16,ty=my-16;
  if(tx+300>window.innerWidth)tx=mx-316;
  if(ty+185>window.innerHeight)ty=my-185;
  tip.style.left=tx+'px';tip.style.top=ty+'px';tip.style.display='block';
}
function HT(){document.getElementById('tip').style.display='none';}

// ── PERSIST ────────────────────────────────────────────────────────────
function SV(){localStorage.setItem('d4v_pg',JSON.stringify(gR));localStorage.setItem('d4v_pp',JSON.stringify(pR));}
function LV(){try{gR=JSON.parse(localStorage.getItem('d4v_pg')||'{}');}catch(e){gR={};}try{pR=JSON.parse(localStorage.getItem('d4v_pp')||'{}');}catch(e){pR={};}}

// ── HELPERS ────────────────────────────────────────────────────────────
function RR(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function STAR(cx,cy,or,ir,pts){ctx.beginPath();for(let i=0;i<pts*2;i++){const r=i%2===0?or:ir,a=i*Math.PI/pts-Math.PI/2;if(i===0)ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a));else ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}ctx.closePath();}
function wrapTxt(text,maxW,fs){const cw=fs*0.58,mc=Math.floor(maxW/cw);if(text.length<=mc)return[text];const ws=text.split(' ');const ls=[];let cur='';for(const w of ws){if((cur+' '+w).trim().length>mc){if(cur)ls.push(cur);cur=w;}else cur=(cur+' '+w).trim();}if(cur)ls.push(cur);return ls.slice(0,2);}
function trunc(s,l){return s.length>l?s.slice(0,l-1)+'…':s;}

LV(); RV(); draw();
</script>
