<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D4 Vault — Paladin Skill Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0a0f;
  --bg2:      #111118;
  --bg3:      #18181f;
  --border:   rgba(180,140,80,0.18);
  --border2:  rgba(180,140,80,0.4);
  --gold:     #c9a84c;
  --gold2:    #e8c97a;
  --text:     #d4cfc0;
  --text2:    #8a8070;
  --text3:    #5a5040;
  --green:    #2ecc71;
  --red:      #e74c3c;
  --blue:     #5dade2;
  --purple:   #9b59b6;
  --font-head:'Cinzel', serif;
  --font-body:'Rajdhani', sans-serif;

  /* node type colors */
  --node-active:    #1a1510;
  --node-passive:   #0f1520;
  --node-ultimate:  #1a0f0f;
  --node-key:       #180a0a;

  /* section colors */
  --basic-col:   #c8a96e;
  --core-col:    #e8c97a;
  --aura-col:    #ffb347;
  --valor-col:   #90ee90;
  --justice-col: #da70d6;
  --ultimate-col:#ff6b6b;
  --key-col:     #ff4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  display: flex;
  flex-direction: column;
}

/* ── TOOLBAR ─────────────────────────────────── */
#toolbar {
  height: 52px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 10;
}
.toolbar-title {
  font-family: var(--font-head);
  font-size: 14px;
  color: var(--gold2);
  letter-spacing: 0.1em;
  margin-right: 8px;
}
.toolbar-sep { width: 1px; height: 24px; background: var(--border); }
.mode-btn {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
}
.mode-btn:hover { border-color: var(--border2); color: var(--text2); }
.mode-btn.active-guide {
  background: rgba(201,168,76,0.15);
  border-color: var(--gold);
  color: var(--gold2);
}
.mode-btn.active-progress {
  background: rgba(46,204,113,0.12);
  border-color: rgba(46,204,113,0.5);
  color: var(--green);
}
.toolbar-info {
  margin-left: auto;
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 0.04em;
}
.zoom-btns { display: flex; gap: 4px; }
.zoom-btn {
  width: 28px; height: 28px;
  font-size: 16px;
  line-height: 1;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.zoom-btn:hover { border-color: var(--border2); color: var(--text); }
.expand-btn {
  margin-left: 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
}
.expand-btn:hover { border-color: var(--border2); color: var(--text2); }

/* point counters */
.point-display {
  display: flex;
  gap: 14px;
  font-size: 12px;
}
.point-item { display: flex; align-items: center; gap: 5px; }
.point-dot { width: 8px; height: 8px; border-radius: 50%; }
.point-label { color: var(--text3); }
.point-val { color: var(--text); font-weight: 600; }

/* ── CANVAS AREA ─────────────────────────────── */
#treeWrap {
  flex: 1;
  overflow: hidden;
  position: relative;
  cursor: grab;
}
#treeWrap.grabbing { cursor: grabbing; }
#treeCanvas {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
}

/* ── SECTION LABEL OVERLAYS ──────────────────── */
.section-label {
  position: absolute;
  font-family: var(--font-head);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  pointer-events: none;
  opacity: 0.5;
}

/* ── TOOLTIP ─────────────────────────────────── */
#tooltip {
  position: fixed;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 10px 14px;
  max-width: 260px;
  pointer-events: none;
  z-index: 1000;
  display: none;
  font-size: 13px;
}
#tooltip .tt-name {
  font-family: var(--font-head);
  font-size: 13px;
  color: var(--gold2);
  margin-bottom: 4px;
  letter-spacing: 0.05em;
}
#tooltip .tt-tags {
  display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px;
}
#tooltip .tt-tag {
  font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 1px 6px; border-radius: 2px;
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--gold);
}
#tooltip .tt-rank { font-size: 11px; color: var(--gold); margin-bottom: 5px; font-weight: 600; }
#tooltip .tt-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
#tooltip .tt-cd   { font-size: 11px; color: var(--blue); margin-top: 5px; }
#tooltip .tt-hint { font-size: 10px; color: var(--text3); margin-top: 6px; font-style: italic; }
</style>
</head>
<body>

<div id="toolbar">
  <span class="toolbar-title">Paladin — Skill Tree</span>
  <div class="toolbar-sep"></div>
  <button class="mode-btn active-guide" id="btnGuide"   onclick="setMode('guide')">Guide Mode</button>
  <button class="mode-btn"              id="btnProgress" onclick="setMode('progress')">Progress Mode</button>
  <div class="toolbar-sep"></div>
  <div class="point-display">
    <div class="point-item">
      <div class="point-dot" style="background:var(--gold)"></div>
      <span class="point-label">Guide</span>
      <span class="point-val" id="guidePoints">0</span>
    </div>
    <div class="point-item">
      <div class="point-dot" style="background:var(--green)"></div>
      <span class="point-label">Progress</span>
      <span class="point-val" id="progressPoints">0</span>
    </div>
  </div>
  <div class="toolbar-sep"></div>
  <div class="zoom-btns">
    <button class="zoom-btn" onclick="zoom(1.2)">+</button>
    <button class="zoom-btn" onclick="zoom(0.8)">−</button>
    <button class="zoom-btn" onclick="resetView()" title="Reset view">⌂</button>
  </div>
  <div class="toolbar-info" id="zoomLabel">100%</div>
</div>

<div id="treeWrap">
  <canvas id="treeCanvas"></canvas>
</div>

<div id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-tags" id="ttTags"></div>
  <div class="tt-rank" id="ttRank"></div>
  <div class="tt-desc" id="ttDesc"></div>
  <div class="tt-cd"   id="ttCd"></div>
  <div class="tt-hint" id="ttHint"></div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const NODE_SIZE   = 40;   // active/ultimate square size
const PASSIVE_SIZE= 28;   // passive diamond size
const KEY_SIZE    = 52;   // key passive size
const UPGRADE_SIZE= 22;   // small upgrade diamond
const LINE_COLOR  = 'rgba(120,100,60,0.4)';
const LINE_ACTIVE = 'rgba(201,168,76,0.7)';
const LINE_PROGRESS='rgba(46,204,113,0.7)';

const TYPE_COLORS = {
  active:      { fill:'#1e1a12', stroke:'#6a5830', textFill:'#c9a84c' },
  passive:     { fill:'#0e1318', stroke:'#2a4060', textFill:'#5dade2' },
  upgrade:     { fill:'#14100c', stroke:'#4a3820', textFill:'#8a7050' },
  ultimate:    { fill:'#1a0e0e', stroke:'#6a2020', textFill:'#e74c3c' },
  'key-passive':{ fill:'#1a0808', stroke:'#8a1010', textFill:'#ff6b6b' }
};

const SECTION_COLORS = {
  basic:       '#c8a96e',
  core:        '#e8c97a',
  aura:        '#ffb347',
  valor:       '#90ee90',
  justice:     '#da70d6',
  ultimate:    '#ff6b6b',
  'key-passives':'#ff4444'
};

// ── STATE ──────────────────────────────────────────────────────────────────
let treeData   = null;
let allNodes   = [];   // flat list of all nodes with computed screen positions
let mode       = 'guide';  // 'guide' | 'progress'
let guideRanks = {};   // nodeId → rank (guide mode)
let progRanks  = {};   // nodeId → rank (progress mode)

// Pan/zoom
let scale  = 0.7;
let panX   = 40;
let panY   = 20;
let isPanning = false;
let lastMouse = { x:0, y:0 };

// Hover
let hoveredNode = null;

// ── LOAD DATA ──────────────────────────────────────────────────────────────
async function loadTree() {
  try {
    const res = await fetch('data/skills/paladin.json');
    treeData = await res.json();
    flattenNodes();
    initCanvas();
    draw();
  } catch(e) {
    console.error('Failed to load paladin.json:', e);
    document.getElementById('treeWrap').innerHTML =
      '<div style="padding:40px;color:#8a8070;font-family:Rajdhani,sans-serif">Could not load paladin.json — make sure the file is in data/skills/</div>';
  }
}

// Flatten all nodes into a single array with computed x/y
function flattenNodes() {
  allNodes = [];
  if (!treeData) return;
  for (const section of treeData.sections) {
    // Passives
    for (const p of (section.passives || [])) {
      allNodes.push({ ...p, section: section.id, sectionColor: SECTION_COLORS[section.id] });
    }
    // Main nodes + upgrades recursively
    for (const n of (section.nodes || [])) {
      flattenNode(n, section);
    }
  }
}

function flattenNode(node, section, parentId = null) {
  allNodes.push({ ...node, section: section.id, sectionColor: SECTION_COLORS[section.id], parentId, upgrades: undefined });
  for (const u of (node.upgrades || [])) {
    flattenNode(u, section, node.id);
  }
}

// ── CANVAS SETUP ──────────────────────────────────────────────────────────
const wrap   = document.getElementById('treeWrap');
const canvas = document.getElementById('treeCanvas');
const ctx    = canvas.getContext('2d');

function initCanvas() {
  // Set canvas to match the tree data extents
  const maxX = Math.max(...allNodes.map(n => n.x)) + 120;
  const maxY = Math.max(...allNodes.map(n => n.y)) + 120;
  canvas.width  = maxX;
  canvas.height = maxY;
  applyTransform();
}

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
}

function resetView() {
  scale = 0.7;
  panX  = 40;
  panY  = 20;
  applyTransform();
}

// ── DRAW ──────────────────────────────────────────────────────────────────
function draw() {
  if (!treeData) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw section bg bands
  drawSectionBands();

  // Draw connections first (under nodes)
  drawConnections();

  // Draw nodes
  for (const node of allNodes) {
    drawNode(node);
  }

  updatePointCounters();
}

function drawSectionBands() {
  for (const section of treeData.sections) {
    const nodesInSection = allNodes.filter(n => n.section === section.id);
    if (!nodesInSection.length) continue;
    const minY = Math.min(...nodesInSection.map(n => n.y)) - 50;
    const maxY = Math.max(...nodesInSection.map(n => n.y)) + 80;
    const col  = SECTION_COLORS[section.id] || '#888';

    // Subtle band
    ctx.fillStyle = hexToRgba(col, 0.03);
    ctx.fillRect(0, minY, canvas.width, maxY - minY);

    // Section label on left
    ctx.font = 'bold 11px Cinzel, serif';
    ctx.fillStyle = hexToRgba(col, 0.35);
    ctx.letterSpacing = '3px';
    ctx.fillText(section.name.toUpperCase(), 12, minY + 28);
    ctx.letterSpacing = '0px';

    // Thin top border line
    ctx.strokeStyle = hexToRgba(col, 0.15);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, minY); ctx.lineTo(canvas.width, minY);
    ctx.stroke();
  }
}

function drawConnections() {
  for (const node of allNodes) {
    const parent = allNodes.find(n => n.id === node.parentId);
    if (!parent) continue;

    const gr = getGuideRank(node.id);
    const pr = getProgressRank(node.id);
    const pgr = getGuideRank(parent.id);
    const ppr = getProgressRank(parent.id);

    let color = LINE_COLOR;
    if (mode === 'guide'    && gr > 0 && pgr > 0)  color = LINE_ACTIVE;
    if (mode === 'progress' && pr > 0 && ppr > 0)  color = LINE_PROGRESS;

    ctx.strokeStyle = color;
    ctx.lineWidth   = mode === 'guide' ? (gr > 0 && pgr > 0 ? 2 : 1) : (pr > 0 && ppr > 0 ? 2 : 1);
    ctx.setLineDash(color === LINE_COLOR ? [3,3] : []);
    ctx.beginPath();
    ctx.moveTo(parent.x, parent.y);
    ctx.lineTo(node.x, node.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawNode(node) {
  const { x, y, type, name, maxRank, sectionColor } = node;
  const gr = getGuideRank(node.id);
  const pr = getProgressRank(node.id);
  const isHovered = hoveredNode && hoveredNode.id === node.id;

  const rank = mode === 'guide' ? gr : pr;
  const hasPoints = rank > 0;

  ctx.save();

  // Determine node style
  if (type === 'active' || type === 'ultimate') {
    drawSquareNode(node, gr, pr, isHovered, sectionColor);
  } else if (type === 'key-passive') {
    drawKeyNode(node, gr, pr, isHovered);
  } else if (type === 'passive') {
    drawDiamondNode(node, gr, pr, isHovered, PASSIVE_SIZE, sectionColor);
  } else {
    // upgrade
    drawDiamondNode(node, gr, pr, isHovered, UPGRADE_SIZE, sectionColor);
  }

  ctx.restore();
}

function drawSquareNode(node, gr, pr, isHovered, sectionColor) {
  const { x, y, type, name, maxRank } = node;
  const size = type === 'ultimate' ? NODE_SIZE + 6 : NODE_SIZE;
  const half = size / 2;
  const rank = mode === 'guide' ? gr : pr;
  const hasPoints = rank > 0;
  const col = TYPE_COLORS[type] || TYPE_COLORS.active;

  // Outer glow if active
  if (hasPoints) {
    ctx.shadowColor = mode === 'guide' ? 'rgba(201,168,76,0.6)' : 'rgba(46,204,113,0.6)';
    ctx.shadowBlur  = isHovered ? 16 : 10;
  } else if (isHovered) {
    ctx.shadowColor = 'rgba(201,168,76,0.3)';
    ctx.shadowBlur  = 8;
  }

  // Background
  ctx.fillStyle = hasPoints
    ? (mode === 'guide' ? 'rgba(40,30,10,0.95)' : 'rgba(10,30,15,0.95)')
    : col.fill;
  roundRect(ctx, x - half, y - half, size, size, 4);
  ctx.fill();

  // Border
  ctx.shadowBlur = 0;
  ctx.strokeStyle = hasPoints
    ? (mode === 'guide' ? sectionColor || col.stroke : '#2ecc71')
    : (isHovered ? 'rgba(201,168,76,0.6)' : col.stroke);
  ctx.lineWidth = hasPoints ? 2 : 1;
  roundRect(ctx, x - half, y - half, size, size, 4);
  ctx.stroke();

  // Progress overlay strip at bottom
  if (mode === 'progress' && gr > 0) {
    const frac = Math.min(pr / maxRank, 1);
    ctx.fillStyle = 'rgba(46,204,113,0.25)';
    ctx.fillRect(x - half + 2, y + half - 8, (size - 4) * frac, 5);
    // guide outline
    ctx.strokeStyle = 'rgba(201,168,76,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x - half + 2, y + half - 8, size - 4, 5);
  }

  // Rank text
  if (maxRank > 1) {
    ctx.font = `bold 10px Rajdhani, sans-serif`;
    ctx.fillStyle = hasPoints
      ? (mode === 'guide' ? '#e8c97a' : '#2ecc71')
      : '#5a5040';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`${rank}/${maxRank}`, x, y + half - 2);
  }

  // Name (truncated)
  ctx.font = `500 9px Rajdhani, sans-serif`;
  ctx.fillStyle = hasPoints ? '#d4cfc0' : '#4a4035';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const shortName = truncate(name, 12);
  ctx.fillText(shortName, x, y + (maxRank > 1 ? -5 : 0));
}

function drawDiamondNode(node, gr, pr, isHovered, size, sectionColor) {
  const { x, y, name, maxRank, type } = node;
  const half = size / 2;
  const rank = mode === 'guide' ? gr : pr;
  const hasPoints = rank > 0;
  const col = TYPE_COLORS[type] || TYPE_COLORS.upgrade;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.PI / 4);

  if (hasPoints) {
    ctx.shadowColor = mode === 'guide' ? 'rgba(201,168,76,0.5)' : 'rgba(46,204,113,0.5)';
    ctx.shadowBlur  = isHovered ? 12 : 7;
  }

  ctx.fillStyle = hasPoints
    ? (mode === 'guide' ? 'rgba(35,28,10,0.95)' : 'rgba(8,28,15,0.95)')
    : col.fill;
  ctx.fillRect(-half, -half, size, size);

  ctx.shadowBlur = 0;
  ctx.strokeStyle = hasPoints
    ? (mode === 'guide' ? sectionColor || '#c9a84c' : '#2ecc71')
    : (isHovered ? 'rgba(201,168,76,0.5)' : col.stroke);
  ctx.lineWidth = hasPoints ? 1.5 : 0.75;
  ctx.strokeRect(-half, -half, size, size);

  ctx.restore();

  // Rank in center
  if (maxRank > 1 && size >= 26) {
    ctx.font = `bold 9px Rajdhani, sans-serif`;
    ctx.fillStyle = hasPoints ? (mode === 'guide' ? '#e8c97a' : '#2ecc71') : '#3a3028';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${rank}/${maxRank}`, x, y);
  } else if (size < 26) {
    // tiny dot for smallest nodes
    ctx.beginPath();
    ctx.arc(x, y, hasPoints ? 3 : 2, 0, Math.PI * 2);
    ctx.fillStyle = hasPoints ? (mode === 'guide' ? '#c9a84c' : '#2ecc71') : '#3a3028';
    ctx.fill();
  }
}

function drawKeyNode(node, gr, pr, isHovered) {
  const { x, y, name, maxRank } = node;
  const r = KEY_SIZE / 2;
  const rank = mode === 'guide' ? gr : pr;
  const hasPoints = rank > 0;

  // Star/burst shape using polygon
  if (hasPoints) {
    ctx.shadowColor = mode === 'guide' ? 'rgba(255,100,100,0.7)' : 'rgba(46,204,113,0.7)';
    ctx.shadowBlur  = isHovered ? 20 : 14;
  }

  // Outer star ring
  drawStar(ctx, x, y, r + 6, r, 8);
  ctx.fillStyle = hasPoints
    ? (mode === 'guide' ? 'rgba(60,10,10,0.9)' : 'rgba(10,40,20,0.9)')
    : '#120808';
  ctx.fill();
  ctx.strokeStyle = hasPoints
    ? (mode === 'guide' ? '#ff6b6b' : '#2ecc71')
    : '#4a1010';
  ctx.lineWidth = hasPoints ? 2 : 1;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Inner circle
  ctx.beginPath();
  ctx.arc(x, y, r - 4, 0, Math.PI * 2);
  ctx.fillStyle = hasPoints
    ? (mode === 'guide' ? 'rgba(80,15,15,0.95)' : 'rgba(15,60,30,0.95)')
    : '#1a0808';
  ctx.fill();
  ctx.strokeStyle = hasPoints ? '#ff6b6b' : '#3a0808';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Name
  ctx.font = `600 9px Rajdhani, sans-serif`;
  ctx.fillStyle = hasPoints ? '#ff9999' : '#5a2020';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(truncate(name, 10), x, y);
}

// ── HIT TESTING ───────────────────────────────────────────────────────────
function getNodeAt(canvasX, canvasY) {
  for (const node of [...allNodes].reverse()) {
    const dx = canvasX - node.x;
    const dy = canvasY - node.y;
    const size = getNodeHitSize(node.type);
    if (Math.abs(dx) <= size && Math.abs(dy) <= size) return node;
  }
  return null;
}

function getNodeHitSize(type) {
  if (type === 'key-passive') return KEY_SIZE / 2 + 6;
  if (type === 'active' || type === 'ultimate') return NODE_SIZE / 2 + 2;
  if (type === 'passive') return PASSIVE_SIZE / 2 + 2;
  return UPGRADE_SIZE / 2 + 2;
}

function screenToCanvas(sx, sy) {
  const rect = wrap.getBoundingClientRect();
  return {
    x: (sx - rect.left - panX) / scale,
    y: (sy - rect.top  - panY) / scale
  };
}

// ── RANK MANAGEMENT ───────────────────────────────────────────────────────
function getGuideRank(id)    { return guideRanks[id]  || 0; }
function getProgressRank(id) { return progRanks[id]   || 0; }

function incrementRank(node) {
  const maxR = node.maxRank || 1;
  if (mode === 'guide') {
    guideRanks[node.id] = Math.min((guideRanks[node.id] || 0) + 1, maxR);
  } else {
    progRanks[node.id] = Math.min((progRanks[node.id] || 0) + 1, maxR);
  }
  saveState();
  draw();
}

function decrementRank(node) {
  if (mode === 'guide') {
    guideRanks[node.id] = Math.max((guideRanks[node.id] || 0) - 1, 0);
    if (!guideRanks[node.id]) delete guideRanks[node.id];
  } else {
    progRanks[node.id] = Math.max((progRanks[node.id] || 0) - 1, 0);
    if (!progRanks[node.id]) delete progRanks[node.id];
  }
  saveState();
  draw();
}

function updatePointCounters() {
  const gTotal = Object.values(guideRanks).reduce((s, v) => s + v, 0);
  const pTotal = Object.values(progRanks).reduce((s, v) => s + v, 0);
  document.getElementById('guidePoints').textContent    = gTotal;
  document.getElementById('progressPoints').textContent = pTotal;
}

// ── MODE ──────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btnGuide').className    = 'mode-btn' + (m === 'guide'    ? ' active-guide'    : '');
  document.getElementById('btnProgress').className = 'mode-btn' + (m === 'progress' ? ' active-progress' : '');
  draw();
}

// ── ZOOM / PAN ────────────────────────────────────────────────────────────
function zoom(factor, cx, cy) {
  cx = cx ?? wrap.clientWidth  / 2;
  cy = cy ?? wrap.clientHeight / 2;
  const newScale = Math.min(Math.max(scale * factor, 0.2), 3);
  panX = cx - (cx - panX) * (newScale / scale);
  panY = cy - (cy - panY) * (newScale / scale);
  scale = newScale;
  applyTransform();
}

function resetView() {
  scale = 0.65;
  panX  = 60;
  panY  = 30;
  applyTransform();
}

// Mouse events
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  zoom(e.deltaY < 0 ? 1.1 : 0.9, e.clientX - rect.left, e.clientY - rect.top);
}, { passive: false });

wrap.addEventListener('mousedown', e => {
  if (e.button === 1 || e.button === 0) {
    const pos = screenToCanvas(e.clientX, e.clientY);
    const node = getNodeAt(pos.x, pos.y);
    if (node && e.button === 0) {
      // Click on node — handled on mouseup to distinguish from drag
      wrap._clickNode  = node;
      wrap._clickStart = { x: e.clientX, y: e.clientY };
    }
    isPanning = true;
    lastMouse = { x: e.clientX, y: e.clientY };
    wrap.classList.add('grabbing');
  }
});

wrap.addEventListener('mousemove', e => {
  if (isPanning) {
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    panX += dx; panY += dy;
    lastMouse = { x: e.clientX, y: e.clientY };
    applyTransform();
    // If moved more than 4px, cancel click intent
    if (wrap._clickStart) {
      const moved = Math.abs(e.clientX - wrap._clickStart.x) + Math.abs(e.clientY - wrap._clickStart.y);
      if (moved > 4) wrap._clickNode = null;
    }
  }

  // Hover
  const pos = screenToCanvas(e.clientX, e.clientY);
  const node = getNodeAt(pos.x, pos.y);
  if (node !== hoveredNode) {
    hoveredNode = node;
    draw();
  }
  if (node) showTooltip(node, e.clientX, e.clientY);
  else hideTooltip();
});

wrap.addEventListener('mouseup', e => {
  isPanning = false;
  wrap.classList.remove('grabbing');

  if (wrap._clickNode) {
    if (e.button === 0) incrementRank(wrap._clickNode);
    wrap._clickNode = null;
  }
});

wrap.addEventListener('contextmenu', e => {
  e.preventDefault();
  const pos = screenToCanvas(e.clientX, e.clientY);
  const node = getNodeAt(pos.x, pos.y);
  if (node) decrementRank(node);
});

wrap.addEventListener('mouseleave', () => {
  isPanning = false;
  wrap.classList.remove('grabbing');
  hideTooltip();
  hoveredNode = null;
  draw();
});

// ── TOOLTIP ───────────────────────────────────────────────────────────────
function showTooltip(node, mx, my) {
  const tt = document.getElementById('tooltip');
  const gr = getGuideRank(node.id);
  const pr = getProgressRank(node.id);

  document.getElementById('ttName').textContent = node.name;

  const tagsEl = document.getElementById('ttTags');
  tagsEl.innerHTML = '';
  for (const tag of (node.tags || [])) {
    const span = document.createElement('span');
    span.className = 'tt-tag';
    span.textContent = tag;
    tagsEl.appendChild(span);
  }

  document.getElementById('ttRank').textContent =
    `Guide: ${gr}/${node.maxRank}  ·  Progress: ${pr}/${node.maxRank}`;

  document.getElementById('ttDesc').textContent = node.desc || '';

  const cd = node.cooldown ? `Cooldown: ${node.cooldown}s` : node.charges ? `${node.charges} Charges (${node.chargeCooldown}s)` : '';
  document.getElementById('ttCd').textContent = cd;

  document.getElementById('ttHint').textContent =
    mode === 'guide'
      ? 'Left click to add rank · Right click to remove'
      : 'Left click to mark progress · Right click to remove';

  // Position tooltip
  const tw = 268, th = 160;
  let tx = mx + 14, ty = my - 20;
  if (tx + tw > window.innerWidth)  tx = mx - tw - 10;
  if (ty + th > window.innerHeight) ty = my - th;
  tt.style.left    = tx + 'px';
  tt.style.top     = ty + 'px';
  tt.style.display = 'block';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ── PERSISTENCE ───────────────────────────────────────────────────────────
function saveState() {
  localStorage.setItem('d4vault_pal_guide', JSON.stringify(guideRanks));
  localStorage.setItem('d4vault_pal_prog',  JSON.stringify(progRanks));
}

function loadState() {
  try { guideRanks = JSON.parse(localStorage.getItem('d4vault_pal_guide') || '{}'); } catch(e) { guideRanks = {}; }
  try { progRanks  = JSON.parse(localStorage.getItem('d4vault_pal_prog')  || '{}'); } catch(e) { progRanks  = {}; }
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawStar(ctx, cx, cy, outerR, innerR, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r     = i % 2 === 0 ? outerR : innerR;
    const angle = (i * Math.PI) / points - Math.PI / 2;
    if (i === 0) ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    else          ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
  }
  ctx.closePath();
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function truncate(str, len) {
  return str.length > len ? str.slice(0, len - 1) + '…' : str;
}

// ── INIT ──────────────────────────────────────────────────────────────────
loadState();
resetView();
loadTree();
</script>
