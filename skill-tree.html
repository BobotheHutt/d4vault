<script>
const D2R=Math.PI/180;
const SZ={active:50,ultimate:56,passive:26,upgrade:20,key:116};
const SECTION_REQ={basic:0,core:1,aura:2,valor:11,justice:16,ultimate:23,keys:33};

// Passive color — consistent brownish neutral
const PASSCOL={fill:'#1a1208',border:'#907040',node:'#b08850'};

// Section colors — medium brightness, icon-representative
const COL={
  basic:   {fill:'#221808',border:'#c89038',node:'#d4a048'},
  core:    {fill:'#1e1a06',border:'#c8a028',node:'#d4b038'},
  aura:    {fill:'#221408',border:'#c86828',node:'#d47838'},
  valor:   {fill:'#0a1c0a',border:'#4a9840',node:'#5ab050'},
  justice: {fill:'#180828',border:'#9040c0',node:'#a858d8'},
  ultimate:{fill:'#260808',border:'#c03535',node:'#d04545'},
  keys:    {fill:'#2e0606',border:'#d03535',node:'#e04545'},
};

const H={
  basic:   {x:780, y:480},
  core:    {x:460, y:1020},
  aura:    {x:960, y:1580},
  valor:   {x:460, y:2140},
  justice: {x:960, y:2700},
  ultimate:{x:460, y:3260},
  keys:    {x:780, y:3820},
};

const ARM=240, UPG=85, UPC=68, PAR=170, PPC=95;

// Find intersection point on diamond edge between point (x1,y1) and diamond center (dx,dy)
function diamondEdge(x1,y1,dx,dy,h){
  const ax=x1-dx, ay=y1-dy;
  if(ax===0&&ay===0) return {x:dx,y:dy};
  // Diamond edge: |x|/h + |y|/h = 1 → |x|+|y| = h
  // Parametric: x=ax*t, y=ay*t, find t where |ax*t|+|ay*t|=h
  const t = h / (Math.abs(ax)+Math.abs(ay));
  return {x:dx+ax*t, y:dy+ay*t};
}
function P(cx,cy,r,deg){const a=(deg-90)*D2R;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}

const N=[];

function act(sec,id,name,isUlt,deg,mr,tags,desc,cd,extra,upgs,skillCol){
  const secC=COL[sec];
  const c=skillCol?{fill:skillCol.fill,border:skillCol.border,node:skillCol.node}:secC;
  const hub=H[sec],p=P(hub.x,hub.y,ARM,deg);
  N.push({id,name,type:isUlt?'ultimate':'active',maxRank:mr,x:p.x,y:p.y,sec,parentId:null,c,tags,desc,cooldown:cd,charges:extra?.ch,chargeCd:extra?.ccd});
  if(!upgs?.length)return;
  // Enhanced goes straight out from active in same direction
  const e=upgs[0],ep=P(p.x,p.y,UPG,deg);
  N.push({id:e.id,name:e.name,type:'upgrade',maxRank:1,x:ep.x,y:ep.y,sec,parentId:id,c,tags:[],desc:e.desc});
  // Three choices all branch off Enhanced
  // They fan out perpendicular to the arm direction (left, straight, right of outward)
  // This ensures nothing crosses back over the spine
  const perp = 32; // angular spread for choices
  if(e.ca){const ca=P(ep.x,ep.y,UPC,deg-perp);N.push({id:e.ca.id,name:e.ca.name,type:'upgrade',maxRank:1,x:ca.x,y:ca.y,sec,parentId:e.id,c,tags:[],desc:e.ca.desc});}
  if(e.cb){const cb=P(ep.x,ep.y,UPC,deg);N.push({id:e.cb.id,name:e.cb.name,type:'upgrade',maxRank:1,x:cb.x,y:cb.y,sec,parentId:e.id,c,tags:[],desc:e.cb.desc});}
  if(e.cc){const cc=P(ep.x,ep.y,UPC,deg+perp);N.push({id:e.cc.id,name:e.cc.name,type:'upgrade',maxRank:1,x:cc.x,y:cc.y,sec,parentId:e.id,c,tags:[],desc:e.cc.desc});}
}

// LEFT hubs (core,valor,ultimate) at x~420: passives go RIGHT toward spine
// RIGHT hubs (aura,justice) at x~900: passives go LEFT toward spine
// keys hub: no passives
// Passive positioning uses fixed dx/dy offsets, not polar angles
// This ensures they never cross the spine
function pass(sec,items){
  const c=COL[sec],hub=H[sec];
  const isLeft = hub.x < 600;
  const dir = isLeft ? 1 : -1;
  for(const it of items){
    let x,y;
    // Absolute position override
    if(it.ax !== undefined){ x=it.ax; y=it.ay; }
    else if(!it.parentId){
      if(it.deg !== undefined){
        const pos = P(hub.x,hub.y,it.pDist||PAR,it.deg);
        x=pos.x; y=pos.y;
      } else {
        x = hub.x + dir*(it.dx??PAR);
        y = hub.y + (it.dy??0);
      }
    } else {
      const par=N.find(n=>n.id===it.parentId);
      if(!par){x=hub.x;y=hub.y;}
      else if(it.deg !== undefined){
        const pos = P(par.x,par.y,it.pDist||PPC,it.deg);
        x=pos.x; y=pos.y;
      } else {
        x = par.x + dir*(it.dx??PPC);
        y = par.y + (it.dy??0);
      }
    }
    N.push({id:it.id,name:it.name,type:'passive',maxRank:it.mr||3,x,y,sec,parentId:it.parentId||null,altParentId:it.altParentId||null,c:PASSCOL,tags:[],desc:it.desc,extraLine:it.extraLine||null});
  }
}

// ── BASIC (CW, top hub, no passives) ──────────────────────────────
act('basic','brandish','Brandish',false,330,5,['Juggernaut'],'Brandish the Light, unleashing an arc that deals 105% damage.',null,null,[
  {id:'br-enh',name:'Enhanced Brandish',desc:'Brandish now pierces.',ca:{id:'br-ret',name:'Returning Light',desc:"Brandish's light returns dealing 52% damage."},cb:{id:'br-swd',name:'Sword of Mastery',desc:'While Healthy, Brandish deals 128% damage and travels 100% faster.'},cc:{id:'br-crs',name:'Cross Strike',desc:'Brandish unleashes 2 additional arcs dealing 120% damage, applying Vulnerable.'}},
],{fill:"#1a1408",border:"#c8a830",node:"#e0c040"});
act('basic','holybolt','Holy Bolt',false,30,5,['Judicator'],'Throw a Holy hammer, dealing 126% damage.',null,null,[
  {id:'hb-enh',name:'Enhanced Holy Bolt',desc:'Holy Bolt now applies Judgement.',ca:{id:'hb-ric',name:'Ricocheting Bolt',desc:'Holy Bolt deals 135% damage and ricochets 3 times.'},cb:{id:'hb-div',name:'Divine Bolt',desc:'Holy Bolt becomes a Disciple Skill, pierces, deals 120% damage, applies Vulnerable.'},cc:{id:'hb-str',name:'Storm Bolt',desc:'Holy Bolt becomes a Justice Skill dealing 315% damage and Stunning for 2 seconds.'}},
],{fill:"#0a1020",border:"#4080d0",node:"#60a0e8"});
act('basic','clash','Clash',false,90,5,['Juggernaut'],"Strike an enemy with your weapon and shield, dealing 161% damage.",null,null,[
  {id:'cl-enh',name:'Enhanced Clash',desc:"Whenever you cast Clash, gain Crusader's March for 6 seconds.",ca:{id:'cl-pun',name:'Punishment',desc:"Emboldened during Crusader's March: 30% Retribution, 3 Thorns, x20% Thorns damage."},cb:{id:'cl-ski',name:'Skirmish',desc:'Clash becomes a Zealot Skill, cleaving in an area for 155% damage.'},cc:{id:'cl-sei',name:'Seize Them',desc:'Resolve empowers Clash, x8% increased damage per stack. Every 3rd strike, enemies are Pulled in.'}},
],{fill:"#181008",border:"#b07030",node:"#c88040"});
act('basic','advance','Advance',false,130,5,['Zealot','Mobility'],'Advance forward with your weapon, dealing 147% damage.',null,null,[
  {id:'ad-enh',name:'Enhanced Advance',desc:'Casting Advance grants Unhindered for 2 seconds.',ca:{id:'ad-van',name:"Vanguard's Rush",desc:'Advance rushes into enemies, granting 1 Fervor on each strike.'},cb:{id:'ad-wav',name:'Wave Dash',desc:'Advance becomes a Juggernaut Skill, waves out dealing 136% damage.'},cc:{id:'ad-fla',name:'Flash of the Blade',desc:'Advance becomes a Disciple Skill with 10s cooldown, dealing 230% damage and applying Vulnerable.'}},
],{fill:"#100810",border:"#9060b0",node:"#a870c8"});

// ── CORE (CCW, left hub) ───────────────────────────────────────────
// Passives: 3 direct to hub (45°,90°,135°), middle (EnGuarde@90°) has Riposte+Parry off it
act('core','zeal','Zeal',false,350,5,['Zealot'],'Strike with blinding speed, dealing 112% damage followed by 3 strikes dealing 28% each.',null,null,[
  {id:'ze-enh',name:'Enhanced Zeal',desc:'Zeal gains 2 additional strikes.',ca:{id:'ze-cul',name:'Cull the Wicked',desc:"Zeal's cleave is larger, 2 additional strikes, x25% damage to Weakened."},cb:{id:'ze-dog',name:'Death or Glory',desc:'Zeal costs x10% Maximum Life instead of Faith, strikes around you in a circle.'},cc:{id:'ze-leg',name:"Zealot's Legacy",desc:'Zeal extends its assault, seeking surrounding enemies and striking 4 additional times.'}},
],{fill:"#180a08",border:"#c04020",node:"#d05030"});
act('core','bshield','Blessed Shield',false,300,5,['Judicator'],'Bless and hurl your shield dealing 302% damage ricocheting up to 3 times.',null,null,[
  {id:'bs-enh',name:'Enhanced Blessed Shield',desc:'Blessed Shield deals 1% additional damage for each Armor on your shield.',ca:{id:'bs-jus',name:'Shield of Justice',desc:'Blessed Shield detonates Judgement and ricochets 5 additional times.'},cb:{id:'bs-rev',name:'Shield of the Revenant',desc:'Blessed Shield boomerangs and pierces, dealing 270% damage.'},cc:{id:'bs-ret',name:'Shield of Retribution',desc:'Blessed Shield becomes a Juggernaut Skill, pulsing Thorns damage before bursting for 378%.'}},
],{fill:"#101810",border:"#50a050",node:"#60c060"});
act('core','bhammer','Blessed Hammer',false,260,5,['Judicator'],'Throw a Blessed Hammer that spirals out dealing 161% damage.',null,null,[
  {id:'bh-enh',name:'Enhanced Blessed Hammer',desc:'Blessed Hammer now hits enemies multiple times.',ca:{id:'bh-sht',name:'Shattering Blow',desc:'Blessed Hammer deals 115% and shatters into 3 small explosions on impact.'},cb:{id:'bh-dis',name:"Disciple's Halo",desc:'Becomes a Disciple Skill orbiting around you.'},cc:{id:'bh-mor',name:'Mortar Combat',desc:'Blessed Hammer mortars 3 hammers to the ground, dealing 67% damage in an area.'}},
],{fill:"#101808",border:"#80a030",node:"#90b840"});
act('core','dlance','Divine Lance',false,220,5,['Disciple','Mobility'],'Impale enemies with a heavenly lance, stabbing 2 times for 126% damage each.',null,null,[
  {id:'dl-enh',name:'Enhanced Divine Lance',desc:"Divine Lance's damage increased by 30% of your Movement Speed bonus.",ca:{id:'dl-tip',name:'Tip of the Spear',desc:'Divine Lance flurries, stabbing 2 additional times.'},cb:{id:'dl-jou',name:'Zealous Joust',desc:'Becomes a Zealot Skill, stabbing with 2 additional spears.'},cc:{id:'dl-jav',name:'Divine Javelin',desc:'Throw Divine Lance, dealing 90% damage to first enemy and bursting for 450%.'}},
],{fill:"#08101a",border:"#3070c0",node:"#4080d8"});
act('core','sbash','Shield Bash',false,180,5,['Mobility','Juggernaut'],'Charge at an enemy and bash in front of you, dealing 287% damage.',null,null,[
  {id:'sb-enh',name:'Enhanced Shield Bash',desc:'Hits with Shield Bash count as Blocks.',ca:{id:'sb-bre',name:'Breach',desc:'Shield Bash grants 10% Retribution Chance for 5 seconds, stacking up to 5 times.'},cb:{id:'sb-smi',name:'Smite',desc:'Shield Bash smites first enemy hit, dealing 287% damage and Stunning for 1 second.'},cc:{id:'sb-lay',name:'Lay Siege',desc:'Whenever you have Resolve, Shield Bash increases impact size by x50% and deals 246% damage.'}},
],{fill:"#181008",border:"#b06020",node:"#c87030"});
pass('core',[
  {id:'piety',     name:'Piety',      mr:3,parentId:null,       dx:140,dy:-70, desc:'Your Maximum Faith is increased by 15.'},
  {id:'en-guarde', name:'En Guarde',  mr:3,parentId:null,       dx:140,dy:0,    desc:'You gain +30% Armor and +15% Block Chance.'},
  {id:'discipline',name:'Discipline', mr:3,parentId:null,       dx:140,dy:70,  desc:'Your Core Skills deal x18% increased damage.'},
  {id:'parry',     name:'Parry',      mr:3,parentId:'en-guarde',dx:100,dy:-35,  desc:'Blocking restores 3 Faith.'},
  {id:'riposte',   name:'Riposte',    mr:3,parentId:'en-guarde',dx:100,dy:35,   desc:'Blocking grants you 18% damage for 5 seconds.'},
]);

// ── AURA (CW, right hub) ───────────────────────────────────────────
// Passives LEFT: 3 direct to hub (240°,270°,310°), middle (Longevity@270°) has Anointing+Renewal
act('aura','fan-aura','Fanaticism Aura',false,350,5,['Zealot'],'Passive: Spending Faith grants +7% Attack Speed. Active: Weaken all Nearby enemies.',15,null,[
  {id:'fa-enh',name:'Enhanced Fanaticism Aura',desc:"Passive also grants 10% Maximum Resource.",ca:{id:'fa-ven',name:'Rite of Vengeance',desc:"Passive increases Critical Strike Damage by x15%. Critical Strikes trigger Fanaticism's Passive."},cb:{id:'fa-hum',name:'Rite of Humility',desc:"Active instead makes Nearby enemies Vulnerable for 4 seconds."},cc:{id:'fa-red',name:'Rite of Redemption',desc:'Weakened enemies who die within radius Heal you for 0.5% and Fortify for 1% Maximum Life.'}},
],{fill:"#181808",border:"#c0a020",node:"#d8b830"});
act('aura','def-aura','Defiance Aura',false,80,5,['Defensive','Juggernaut'],"Passive: Grants you and allies 42% Armor and 42% All Resistances. Active: Become Unstoppable for 2 seconds.",20,null,[
  {id:'da-enh',name:'Enhanced Defiance Aura',desc:"Passive also grants 10% Maximum Life.",ca:{id:'da-mig',name:'Rite of Might',desc:'Increases your damage by x10% for 4 seconds whenever you gain Resolve.'},cb:{id:'da-pra',name:'Rite of Prayer',desc:'Passive Heals you and allies for 2% Maximum Life per second.'},cc:{id:'da-tho',name:'Rite of Thorns',desc:'Grants 3 Thorns and increases Thorns damage by x75%. Active releases a nova of Thorns damage.'}},
],{fill:"#080818",border:"#3050c0",node:"#4060d8"});
act('aura','hla','Holy Light Aura',false,160,5,['Judicator'],"Passive: You and allies deal 126% damage every 2 seconds to 3 random Nearby enemies. Active: Unleash 2 bolts of light dealing 448% Holy damage.",25,null,[
  {id:'hl-enh',name:'Enhanced Holy Light Aura',desc:"Holy Light's passive now targets 2 additional enemies.",ca:{id:'hl-jud',name:'Rite of Judgement',desc:"Holy Light's active instead Judges enemies and Cooldown is reduced per rank."},cb:{id:'hl-mer',name:'Rite of Mercy',desc:"Holy Light's active chains 2 more times and Fortifies you and allies for 4% Maximum Life."},cc:{id:'hl-sub',name:'Rite of Submission',desc:"Holy Light's active now Stuns enemies for 3 seconds and deals 182% damage."}},
],{fill:"#181010",border:"#c03030",node:"#d84040"});
pass('aura',[
  {id:'longevity',name:'Longevity',mr:3,parentId:null,       dx:140,dy:0,   desc:'You gain +30% Healing received.'},
  {id:'renewal',  name:'Renewal',  mr:3,parentId:'longevity',dx:100,dy:-40, desc:'Blocking Fortifies you for 1.5% of your Maximum Life.'},
  {id:'anointing',name:'Anointing',mr:3,parentId:'longevity',dx:100,dy:40,  desc:'Your allies Heal for +33% of the Healing you receive.'},
]);

// ── VALOR (CCW, left hub) ──────────────────────────────────────────

// CANVAS + RENDER
// ══════════════════════════════════════════════════════════════════
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const maxX=Math.max(...N.map(n=>n.x),...Object.values(H).map(h=>h.x))+250;
const maxY=Math.max(...N.map(n=>n.y),...Object.values(H).map(h=>h.y))+250;
cv.width=maxX;cv.height=maxY;

let mode='guide',gR={},pR={},editing=false; // start locked — click Confirm to edit
let sc=0.55,px=80,py=30,pan=false,lm={x:0,y:0},hov=null,cn=null,cs=null;

function draw(){
  ctx.fillStyle=window._bgColor||'#1a1a35';ctx.fillRect(0,0,cv.width,cv.height);
  drawSpine();drawLines();
  for(const n of N)drawNode(n);
  drawSpineDiamonds();
  updPts();
}

function drawSpineDiamonds(){
  const spent = totalSpent();
  const guideSpent = Object.values(gR).reduce((s,v)=>s+v,0);
  const progSpent  = Object.values(pR).reduce((s,v)=>s+v,0);
  for(const [key,hub] of Object.entries(H)){
    const req=SECTION_REQ[key]??0;
    const guideUnlocked=guideSpent>=req;
    const progUnlocked=progSpent>=req;
    const unlocked=mode==='guide'?guideUnlocked:(guideUnlocked||progUnlocked);
    const sz=28;
    ctx.save();ctx.translate(hub.x,hub.y);ctx.rotate(Math.PI/4);
    if(progUnlocked&&mode==='progress'){ctx.shadowColor='rgba(62,220,129,.7)';ctx.shadowBlur=16;}
    else if(guideUnlocked){ctx.shadowColor='rgba(201,168,76,.7)';ctx.shadowBlur=16;}
    else{ctx.shadowBlur=0;}
    ctx.fillStyle=unlocked?'#2a2010':'rgba(20,18,40,.95)';
    ctx.fillRect(-sz/2,-sz/2,sz,sz);
    ctx.shadowBlur=0;
    ctx.strokeStyle=progUnlocked&&mode==='progress'?'rgba(62,220,129,.9)':guideUnlocked?'rgba(201,168,76,.9)':'rgba(100,90,160,.35)';
    ctx.lineWidth=unlocked?2.5:1;
    ctx.strokeRect(-sz/2,-sz/2,sz,sz);
    ctx.restore();
  }
}
function drawSpine(){
  const spent = totalSpent();
  // Spine segments: [fromHub, toHub, pointsNeeded, pointsStart]
  const segs = [
    {from:'basic',  to:'core',     start:0,  need:1},
    {from:'core',   to:'aura',     start:1,  need:1},
    {from:'aura',   to:'valor',    start:2,  need:9},
    {from:'valor',  to:'justice',  start:11, need:5},
    {from:'justice',to:'ultimate', start:16, need:7},
    {from:'ultimate',to:'keys',    start:23, need:10},
  ];

  // In progress mode, also compute guide fractions
  const guideSpent = Object.values(gR).reduce((s,v)=>s+v,0);
  const progSpent  = Object.values(pR).reduce((s,v)=>s+v,0);

  for(const seg of segs){
    const p1=H[seg.from], p2=H[seg.to];
    const guideFrac = Math.min(Math.max((guideSpent-seg.start)/seg.need,0),1);
    const progFrac  = Math.min(Math.max((progSpent -seg.start)/seg.need,0),1);
    const frac = mode==='guide' ? guideFrac : progFrac;

    // Draw unlit background line
    ctx.strokeStyle='rgba(80,70,140,.3)';
    ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();

    // In progress mode: draw guide progress as dashed gold underneath
    if(mode==='progress'&&guideFrac>0){
      const glx=p1.x+(p2.x-p1.x)*guideFrac;
      const gly=p1.y+(p2.y-p1.y)*guideFrac;
      ctx.setLineDash([6,4]);
      ctx.strokeStyle='rgba(201,168,76,.85)';
      ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(glx,gly);ctx.stroke();
      ctx.setLineDash([]);
    }

    // Draw current mode lit portion
    if(frac>0){
      const lx=p1.x+(p2.x-p1.x)*frac;
      const ly=p1.y+(p2.y-p1.y)*frac;
      // Glow
      ctx.strokeStyle=mode==='guide'?'rgba(201,168,76,.25)':'rgba(62,220,129,.2)';
      ctx.lineWidth=8;
      ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(lx,ly);ctx.stroke();
      // Main lit line
      ctx.strokeStyle=mode==='guide'
        ?(frac>=1?'rgba(201,168,76,.95)':'rgba(201,168,76,.7)')
        :(frac>=1?'rgba(62,220,129,.95)':'rgba(62,220,129,.75)');
      ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(lx,ly);ctx.stroke();
    }
  }

  // Hub diamonds — glow when guide unlocked, bright when progress also unlocked
  for(const [key,hub] of Object.entries(H)){
    const req=SECTION_REQ[key]??0;
    const guideUnlocked=guideSpent>=req;
    const progUnlocked=progSpent>=req;
    const unlocked=mode==='guide'?guideUnlocked:(guideUnlocked||progUnlocked);
    const sz=28;
    ctx.save();ctx.translate(hub.x,hub.y);ctx.rotate(Math.PI/4);
    if(progUnlocked&&mode==='progress'){
      ctx.shadowColor='rgba(62,220,129,.7)';ctx.shadowBlur=16;
    } else if(guideUnlocked){
      ctx.shadowColor='rgba(201,168,76,.7)';ctx.shadowBlur=16;
    } else {
      ctx.shadowBlur=0;
    }
    ctx.fillStyle=unlocked?'#2a2010':'rgba(20,18,40,.95)';
    ctx.fillRect(-sz/2,-sz/2,sz,sz);
    ctx.shadowBlur=0;
    ctx.strokeStyle=progUnlocked&&mode==='progress'?'rgba(62,220,129,.9)':guideUnlocked?'rgba(201,168,76,.9)':'rgba(100,90,160,.35)';
    ctx.lineWidth=unlocked?2.5:1;
    ctx.strokeRect(-sz/2,-sz/2,sz,sz);
    ctx.restore();
  }
}

function drawLines(){
  // Draw extra lines for diamond connections (nodes with extraLine property)
  for(const n of N){
    if(!n.extraLine) continue;
    const other = N.find(x=>x.id===n.extraLine);
    if(!other) continue;
    const lit = mode==='guide'
      ? ((gR[n.id]||0)>0 && (gR[other.id]||0)>0)
      : ((pR[n.id]||0)>0 && (pR[other.id]||0)>0);
    ctx.beginPath(); ctx.moveTo(n.x,n.y); ctx.lineTo(other.x,other.y);
    if(lit){ctx.strokeStyle=mode==='guide'?(n.c?.border||'#c9a84c'):'#3edc81';ctx.lineWidth=2.5;ctx.globalAlpha=0.9;}
    else{ctx.strokeStyle=n.c?.border||'#8080a0';ctx.lineWidth=1;ctx.globalAlpha=0.3;}
    ctx.stroke(); ctx.globalAlpha=1;
  }
  for(const n of N){
    let x2,y2;
    if(n.parentId){const par=N.find(x=>x.id===n.parentId);if(!par)continue;x2=par.x;y2=par.y;}
    else{
      const hub=H[n.sec];if(!hub)continue;
      // Connect to diamond edge, not center
      const edge=diamondEdge(n.x,n.y,hub.x,hub.y,14);
      x2=edge.x;y2=edge.y;
    }
    const gr=gR[n.id]||0,pr=pR[n.id]||0;
    const pgr=n.parentId?(gR[n.parentId]||0):1,ppr=n.parentId?(pR[n.parentId]||0):1;
    const altgr=n.altParentId?(gR[n.altParentId]||0):0,altpr=n.altParentId?(pR[n.altParentId]||0):0;
    const guideLit=(gr>0)&&(pgr>0||altgr>0);
    // Progress lit only if this node AND its parent both have progress (no orphans)
    const progParentOk=n.parentId?(ppr>0||altpr>0):true;
    const progLit=(pr>0)&&progParentOk;

    if(mode==='progress'){
      // Guide connection — always draw as dashed gold outline so you see the plan
      if(guideLit){
        ctx.setLineDash([5,3]);
        ctx.strokeStyle=n.c?.border||'#c9a84c';ctx.lineWidth=2;ctx.globalAlpha=0.85;
        ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(n.x,n.y);ctx.stroke();
        ctx.setLineDash([]);
      }
      // Progress connection — solid green on top
      if(progLit){ctx.strokeStyle='#3edc81';ctx.lineWidth=2.5;ctx.globalAlpha=0.9;}
      else{ctx.strokeStyle=n.c?.border||'#8080a0';ctx.lineWidth=1;ctx.globalAlpha=0.2;}
    } else {
      // Guide mode — solid colored line
      if(guideLit){ctx.strokeStyle=n.c?.border||'#c9a84c';ctx.lineWidth=2.5;ctx.globalAlpha=0.9;}
      else{ctx.strokeStyle=n.c?.border||'#8080a0';ctx.lineWidth=1;ctx.globalAlpha=0.3;}
    }
    ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(n.x,n.y);ctx.stroke();ctx.globalAlpha=1;
  }
}

function drawNode(n){
  const gr=gR[n.id]||0,pr=pR[n.id]||0;
  // In progress mode: 'has' means guide has points (shows outline), progress rank for fill
  const has=gr>0; // guide outline shown when guide has points
  const rank=mode==='guide'?gr:pr;
  const ih=hov?.id===n.id;
  if(n.type==='active'||n.type==='ultimate')drawSq(n,has,ih,rank);
  else if(n.type==='key-passive')drawKey(n,has,ih);
  else if(n.type==='passive')drawCircle(n,has,ih,rank);
  else drawDia(n,has,ih,rank,SZ.upgrade);
}

function drawSq(n,has,ih,rank){
  ctx.shadowBlur=0;ctx.shadowColor='transparent';
  const{x,y,type,name,maxRank,c}=n;
  const baseSz=type==='ultimate'?SZ.ultimate:SZ.active;
  const sz=baseSz*2;
  const h=sz/2;
  const hub=H[n.sec];
  const extra=(sz-baseSz)/2;
  const ddx=hub?hub.x-x:0,ddy=hub?hub.y-y:0;
  const dist=Math.sqrt(ddx*ddx+ddy*ddy)||1;
  const cx=x+(ddx/dist)*extra, cy=y+(ddy/dist)*extra;
  const secUnlocked=sectionUnlocked(n.sec);
  const guideRank=gR[n.id]||0;
  const progRank=pR[n.id]||0;
  const hasGuide=guideRank>0;
  const hasProgress=progRank>0;

  // Base fill
  ctx.fillStyle=ih?'#1e1e3c':c.fill;
  RR(cx-h,cy-h,sz,sz,5);ctx.fill();

  // Progress fill
  if(mode==='progress'&&hasProgress){
    const f=Math.min(progRank/maxRank,1);
    ctx.fillStyle='rgba(46,180,100,.22)';
    RR(cx-h,cy-h,sz*f,sz,5);ctx.fill();
  }

  // Border + backlight — shadow applied to the stroke so glow radiates outward
  if(hasGuide){
    ctx.shadowColor='rgba(201,168,76,.6)';ctx.shadowBlur=14;
    ctx.strokeStyle=c.border;ctx.lineWidth=3;ctx.globalAlpha=1;
  } else if(secUnlocked){
    ctx.shadowColor='rgba(201,168,76,.5)';ctx.shadowBlur=20;
    ctx.strokeStyle=c.border;ctx.lineWidth=1.5;ctx.globalAlpha=0.7;
  } else if(ih){
    ctx.strokeStyle='rgba(180,170,240,.7)';ctx.lineWidth=1.5;ctx.globalAlpha=0.8;
  } else {
    ctx.strokeStyle=c.border;ctx.lineWidth=1;ctx.globalAlpha=0.4;
  }
  RR(cx-h,cy-h,sz,sz,5);ctx.stroke();
  ctx.shadowBlur=0;ctx.globalAlpha=1;

  // Progress outline on top
  if(mode==='progress'&&hasProgress){
    ctx.shadowColor='rgba(46,200,100,.6)';ctx.shadowBlur=12;
    ctx.strokeStyle='#3edc81';ctx.lineWidth=2.5;ctx.globalAlpha=0.9;
    RR(cx-h,cy-h,sz,sz,5);ctx.stroke();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  // Rank text
  if(maxRank>1){
    ctx.font='bold 13px Rajdhani,sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
    if(mode==='progress'&&hasGuide){
      ctx.fillStyle='#3edc81';ctx.globalAlpha=hasProgress?1:0.4;
      ctx.fillText(`${progRank}/${maxRank}`,cx,cy+h-2);
    } else {
      ctx.fillStyle=c.node;ctx.globalAlpha=hasGuide?1:0.65;
      ctx.fillText(`${guideRank}/${maxRank}`,cx,cy+h-2);
    }
    ctx.globalAlpha=1;
  }

  // Name
  let fs=18,ls=wTxt(name,sz-16,18);
  if(ls.length>1){fs=16;ls=wTxt(name,sz-16,16);}
  if(ls.length>1){fs=14;ls=wTxt(name,sz-16,14);}
  ctx.font=`600 ${fs}px Rajdhani,sans-serif`;
  ctx.fillStyle=hasGuide?'#e8e0d0':c.node;
  ctx.globalAlpha=hasGuide?1:0.7;
  ctx.textAlign='center';ctx.textBaseline='middle';
  const lh=fs+3,sy=cy-(ls.length-1)*lh/2+(maxRank>1?-8:0);
  ls.forEach((l,i)=>ctx.fillText(l,cx,sy+i*lh));ctx.globalAlpha=1;
}

function drawDia(n,has,ih,rank,sz){
  ctx.shadowBlur=0;ctx.shadowColor='transparent';
  const{x,y,name,maxRank,type,c}=n,h=sz/2;
  const secUnlocked=sectionUnlocked(n.sec);
  const hasGuide=(gR[n.id]||0)>0;
  const hasProg=(pR[n.id]||0)>0;

  // Base fill
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.PI/4);
  ctx.fillStyle=ih?'#1e1e3c':c.fill;
  ctx.fillRect(-h,-h,sz,sz);

  // Progress fill
  if(mode==='progress'&&hasProg){
    ctx.fillStyle='rgba(46,180,100,.3)';
    ctx.fillRect(-h,-h,sz,sz);
  }

  // Guide outline — always gold, regardless of mode
  if(hasGuide){
    ctx.shadowColor='rgba(201,168,76,.5)';ctx.shadowBlur=8;
    ctx.strokeStyle=c.border;ctx.lineWidth=2;ctx.globalAlpha=1;
  } else if(secUnlocked){
    ctx.shadowColor='rgba(201,168,76,.45)';ctx.shadowBlur=12;
    ctx.strokeStyle=c.border;ctx.lineWidth=1;ctx.globalAlpha=0.6;
  } else if(ih){
    ctx.strokeStyle='rgba(180,170,240,.8)';ctx.lineWidth=1.5;ctx.globalAlpha=0.8;
  } else {
    ctx.strokeStyle=c.border;ctx.lineWidth=1;ctx.globalAlpha=0.45;
  }
  ctx.strokeRect(-h,-h,sz,sz);
  ctx.shadowBlur=0;ctx.globalAlpha=1;

  // Progress outline on top — bright green
  if(mode==='progress'&&hasProg){
    ctx.shadowColor='rgba(46,200,100,.6)';ctx.shadowBlur=10;
    ctx.strokeStyle='#3edc81';ctx.lineWidth=2;ctx.globalAlpha=0.9;
    ctx.strokeRect(-h,-h,sz,sz);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  ctx.restore();

  // Dot for small upgrade diamonds
  if(sz<24){
    ctx.beginPath();ctx.arc(x,y,hasGuide?3.5:2.5,0,Math.PI*2);
    ctx.fillStyle=hasGuide?c.border:(secUnlocked?'rgba(201,168,76,.5)':c.border);
    ctx.globalAlpha=hasGuide?1:0.5;ctx.fill();ctx.globalAlpha=1;

  if(maxRank>1){
    ctx.font='bold 9px Rajdhani,sans-serif';

    ctx.globalAlpha=hasGuide?1:0.5;

    ctx.globalAlpha=1;

}

function drawKey(n,has,ih){

  ctx.beginPath();ctx.arc(x,y,r-5,0,Math.PI*2);ctx.fillStyle=has?(mode==='guide'?'#3a1010':'#0c2818'):'#1a0820';ctx.fill();
  ctx.strokeStyle=has?c.border:c.border;ctx.lineWidth=1;ctx.globalAlpha=0.5;ctx.stroke();ctx.globalAlpha=1;

  const maxW=SZ.key*0.65;

  ctx.globalAlpha=has?1:0.7;ctx.textAlign='center';ctx.textBaseline='middle';
  const klh=kfs+3,ksy=y-(kls.length-1)*klh/2;
  kls.forEach((l,i)=>ctx.fillText(l,x,ksy+i*klh));ctx.globalAlpha=1;

function nAt(cx,cy){
  for(const n of[...N].reverse()){
    if(n.type==='active'||n.type==='ultimate'){
      // Hit test against the shifted draw center, not the original x,y
      const baseSz=n.type==='ultimate'?SZ.ultimate:SZ.active;
      const sz=baseSz*2;
      const h=sz/2;
      const hub=H[n.sec];
      const extra=(sz-baseSz)/2;
      const ddx=hub?hub.x-n.x:0,ddy=hub?hub.y-n.y:0;
      const dist=Math.sqrt(ddx*ddx+ddy*ddy)||1;
      const dcx=n.x+(ddx/dist)*extra, dcy=n.y+(ddy/dist)*extra;
      if(cx>=dcx-h&&cx<=dcx+h&&cy>=dcy-h&&cy<=dcy+h) return n;
    } else {
      const r=n.type==='key-passive'?SZ.key/2+8:n.type==='passive'?SZ.passive/2+5:SZ.upgrade/2+5;
      if(Math.abs(cx-n.x)<=r&&Math.abs(cy-n.y)<=r) return n;
    }
  }
  return null;
}
function s2c(sx,sy){const r=document.getElementById('wrap').getBoundingClientRect();return{x:(sx-r.left-px)/sc,y:(sy-r.top-py)/sc};}

function parentHasPoints(n){
  if(!n.parentId) return true; // hub-connected, always ok
  const d=mode==='guide'?gR:pR;
  const parPts=d[n.parentId]||0;
  const altPts=n.altParentId?(d[n.altParentId]||0):0;
  return parPts>0||altPts>0;
}
function inc(n){
  if(mode==='guide'&&!editing) return; // guide locked — must click Confirm to edit
  if(!sectionUnlocked(n.sec)) return;
  if(!parentHasPoints(n)) return;
  if(mode==='progress'){
    const guideRank=gR[n.id]||0;
    if(guideRank===0) return;
    const cur=pR[n.id]||0;
    if(cur>=guideRank) return;
    pR[n.id]=cur+1;
  } else {
    gR[n.id]=Math.min((gR[n.id]||0)+1,n.maxRank||1);
  }
  SV();draw();
}
function totalSpent(){
  const d=mode==='guide'?gR:pR;
  return Object.values(d).reduce((s,v)=>s+v,0);
}
function sectionUnlocked(sec){
  return totalSpent()>=( SECTION_REQ[sec]??0);
}
function canDec(n){
  const d=mode==='guide'?gR:pR;
  const cur=d[n.id]||0;
  if(cur<=0) return false;

  // Check 1: would removing 1 point drop total below a section threshold
  // that has invested nodes?
  const newTotal = totalSpent() - 1;
  const sectionOrder = ['basic','core','aura','valor','justice','ultimate','keys'];
  for(const sec of sectionOrder){
    const req = SECTION_REQ[sec]??0;
    if(req===0) continue;
    // If new total drops below this section's requirement
    if(newTotal < req){
      // Check if any node in this section has points invested
      const hasInvested = N.some(x=>x.sec===sec&&(d[x.id]||0)>0);
      if(hasInvested) return false;
    }
  }

  // Check 2: if removing last point, check direct node dependencies
  if(cur>1) return true;
  const dependents = N.filter(x=>{
    if((d[x.id]||0)<=0) return false;
    if(x.parentId===n.id){
      if(x.altParentId && (d[x.altParentId]||0)>0) return false;
      return true;
    }
    if(x.altParentId===n.id){
      if(x.parentId && (d[x.parentId]||0)>0) return false;
      return true;
    }
    return false;
  });
  return dependents.length===0;
}
function dec(n){
  if(mode==='guide'&&!editing) return; // guide locked
  if(!canDec(n)) return;
  const d=mode==='guide'?gR:pR;
  d[n.id]=Math.max((d[n.id]||0)-1,0);
  if(!d[n.id])delete d[n.id];
  // Cascade: if guide point removed, also clear progress on this node
  // and any progress-only orphans down the chain
  if(mode==='guide'){
    if(!gR[n.id]) {
      // Clear progress on this node too
      delete pR[n.id];
      // Cascade clear progress children that are now orphaned
      cascadeClearProgress(n.id);
    }
  }
  SV();draw();
}
function cascadeClearProgress(parentId){
  // Find all nodes whose only guide parent was parentId
  const children = N.filter(x=>{
    if(!(pR[x.id]||0)) return false;
    if(x.parentId===parentId){
      // Still valid if altParentId has guide points
      if(x.altParentId&&(gR[x.altParentId]||0)>0) return false;
      return true;
    }
    if(x.altParentId===parentId){
      if(x.parentId&&(gR[x.parentId]||0)>0) return false;
      return true;
    }
    return false;
  });
  for(const c of children){
    delete pR[c.id];
    cascadeClearProgress(c.id);
  }
}

function ST(n,mx,my){
  const gr=gR[n.id]||0,pr=pR[n.id]||0;
  document.getElementById('tN').textContent=n.name;
  const te=document.getElementById('tT');te.innerHTML='';
  (n.tags||[]).forEach(t=>{const s=document.createElement('span');s.className='tg';s.textContent=t;te.appendChild(s);});
  const progMax=mode==='progress'?(gr||n.maxRank):n.maxRank;
  document.getElementById('tR').textContent=`Guide: ${gr}/${n.maxRank}  ·  Progress: ${pr}/${progMax}`;
  document.getElementById('tD').textContent=n.desc||'';
  document.getElementById('tC').textContent=n.cooldown?`Cooldown: ${n.cooldown}s`:n.charges?`${n.charges} Charges (${n.chargeCd}s)`:'';
  const secLock=!sectionUnlocked(n.sec);
  const req=SECTION_REQ[n.sec]??0;
  const hasPoints=(gR[n.id]||0)>0||(pR[n.id]||0)>0;
  const locked=hasPoints&&!canDec(n);
  // Figure out why locked
  let hintText;
  if(secLock){
    hintText=`Requires ${req} points spent to unlock`;
  } else if(locked){
    // Check if it's a section threshold issue or direct dependency
    const d=mode==='guide'?gR:pR;
    const newTotal=totalSpent()-1;
    const blockedSec=(['core','aura','valor','justice','ultimate','keys']).find(s=>{
      const r=SECTION_REQ[s]??0;
      return newTotal<r && N.some(x=>x.sec===s&&(d[x.id]||0)>0);
    });
    hintText=blockedSec
      ? `Cannot remove — would lose access to ${blockedSec} section`
      : 'Cannot remove — a skill depends on this';
  } else if(mode==='guide'&&!editing){
    hintText='Click "Confirm" to edit the build plan';
  } else if(!parentHasPoints(n)){
    hintText=n.parentId?'Invest in the previous node first':'Cannot invest yet';
  } else if(mode==='progress'&&(gR[n.id]||0)===0){
    hintText='Not in guide plan — add to guide first';
  } else if(mode==='progress'&&(pR[n.id]||0)>=(gR[n.id]||0)){
    hintText='Progress at guide maximum';
  } else {
    hintText=mode==='guide'?'Left click +rank · Right click −rank':'Left click mark progress · Right click remove';
  }
  document.getElementById('tH').textContent=hintText;
  const tip=document.getElementById('tip');let tx=mx+16,ty=my-16;
  if(tx+295>window.innerWidth)tx=mx-311;if(ty+190>window.innerHeight)ty=my-190;
  tip.style.left=tx+'px';tip.style.top=ty+'px';tip.style.display='block';
}

// Allow parent page to reload this iframe's data when variant changes
window.addEventListener('message',e=>{
  if(e.data?.type==='variantChange'){
    // Update URL params without reload by using history
    const url=new URL(window.location.href);
    url.searchParams.set('buildId',e.data.buildId);
    url.searchParams.set('variantIdx',e.data.variantIdx);
    window.history.replaceState({},'',url);
    LV();draw();
  }
});
function RR(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function STAR(cx,cy,or,ir,pts){ctx.beginPath();for(let i=0;i<pts*2;i++){const r=i%2===0?or:ir,a=i*Math.PI/pts-Math.PI/2;if(i===0)ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a));else ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}ctx.closePath();}
function wTxt3(t,mw,fs){const cw=fs*.58,mc=Math.floor(mw/cw);if(t.length<=mc)return[t];const ws=t.split(' ');const ls=[];let c='';for(const w of ws){if((c+' '+w).trim().length>mc){if(c)ls.push(c);c=w;}else c=(c+' '+w).trim();}if(c)ls.push(c);return ls.slice(0,3);}
function wTxt(t,mw,fs){const cw=fs*.58,mc=Math.floor(mw/cw);if(t.length<=mc)return[t];const ws=t.split(' ');const ls=[];let c='';for(const w of ws){if((c+' '+w).trim().length>mc){if(c)ls.push(c);c=w;}else c=(c+' '+w).trim();}if(c)ls.push(c);return ls.slice(0,2);}
function trunc(s,l){return s.length>l?s.slice(0,l-1)+'…':s;}

// Read URL mode param if embedded in app
(function(){
  const urlMode = new URLSearchParams(window.location.search).get('mode');
  if(urlMode==='progress'||urlMode==='guide') mode=urlMode;
  // If embedded with a specific mode, hide the other mode's button
  // and hide reset button for the other mode
  if(urlMode==='progress'){
    document.getElementById('bEditToggle').style.display='none';
    const gr=document.getElementById('settingsResetGuide');
    if(gr) gr.style.display='none'; // progress only shows Clear Progress
    mode='progress';
  } else if(urlMode==='guide'){
    document.getElementById('bEditToggle').style.display='';
    const pr=document.getElementById('settingsResetProgress');
    if(pr) pr.style.display='none'; // guide only shows Reset Guide
    mode='guide';
  } else {
    document.getElementById('bEditToggle').style.display='';
    // standalone: show both
  }
  updEditBtn();
})();
// Scrollbar drag — uses treeContainer height as viewport reference
(function(){
  const sb=document.getElementById('treeScrollbar');
  const sbt=document.getElementById('treeScrollThumb');
  if(!sb||!sbt) return;
  let dragging=false,startY=0,startPy=0;

  function getViewH(){ 
    const tc=document.getElementById('treeContainer');
    return (tc && tc.clientHeight>0) ? tc.clientHeight : window.innerHeight-52; 
  }

  sbt.addEventListener('mousedown',e=>{
    dragging=true; startY=e.clientY; startPy=py;
    sbt.style.background='rgba(201,168,76,.8)';
    sbt.style.cursor='grabbing';
    document.body.style.userSelect='none';
    e.stopPropagation(); e.preventDefault();
  });

  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const H=getViewH();
    const ch=cv.height*sc;
    const thumbH=sbt.offsetHeight;
    const maxTop=sb.clientHeight-thumbH;
    if(maxTop<=0) return;
    const dy=e.clientY-startY;
    const scrollFrac=dy/maxTop;
    py=startPy - scrollFrac*(ch-H);
    AX();
  });

  document.addEventListener('mouseup',()=>{
    if(!dragging) return;
    dragging=false;
    sbt.style.background='rgba(180,160,80,.5)';
    sbt.style.cursor='grab';
    document.body.style.userSelect='';
  });

  // Click track to jump
  sb.addEventListener('mousedown',e=>{
    e.stopPropagation(); e.preventDefault();
    if(e.target===sbt) return;
    const H=getViewH();
    const ch=cv.height*sc;
    const rect=sb.getBoundingClientRect();
    const frac=(e.clientY-rect.top)/sb.clientHeight;
    py=-(frac*Math.max(ch-H,0));
    AX();
  });

  sbt.addEventListener('mouseenter',()=>{ if(!dragging) sbt.style.background='rgba(201,168,76,.65)'; });
  sbt.addEventListener('mouseleave',()=>{ if(!dragging) sbt.style.background='rgba(180,160,80,.5)'; });
})();
function resetFromSettings(m){
  const label = m==='guide'?'Guide':'Progress';
  const d = m==='guide'?gR:pR;
  const count = Object.values(d).reduce((s,v)=>s+v,0);
  if(count===0){ alert(`${label} is already empty.`); return; }
  if(!confirm(`Reset ${label} mode? This will clear all ${count} points.`)) return;
  if(m==='guide'){gR={};}else{pR={};}
  SV(); draw();
  document.getElementById('settingsPanel').style.display='none';
}
function toggleSettings(){
  const p=document.getElementById('settingsPanel');
  p.style.display=p.style.display==='none'?'block':'none';
}
function setBgBrightness(val){
  const v=parseInt(val);
  document.getElementById('bgBrightnessVal').textContent=v;
  // Convert 0-60 value to hex color — base is #1a1a35
  const c=Math.round(v*255/100);
  const hex=c.toString(16).padStart(2,'0');
  // Use same value for R and G, slightly higher for B
  const rb=Math.round(v*0.8*255/100);
  const bb=Math.round(v*1.3*255/100);
  const rhex=rb.toString(16).padStart(2,'0');
  const bhex=Math.min(bb,255).toString(16).padStart(2,'0');
  window._bgColor=`#${rhex}${rhex}${bhex}`;
  document.body.style.background=window._bgColor;
  draw();
}
